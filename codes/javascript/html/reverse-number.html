<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reverse-number</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }
        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .log {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 220px;
        }
        .log strong {
            color: #fbbf24;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>reverseNumber 自定义插件演示</h1>
            </div>
            <div class="subtitle">用 InputNumber / Select / Checkbox / Modal / Notification 构建“数字反转”示例</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>输入与配置</h2>

                <div class="form-row">
                    <label>示例选择</label>
                    <div id="exampleSelect"></div>
                </div>

                <div class="form-row">
                    <label>输入数字</label>
                    <div id="numberInput"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>随机整数位数</label>
                        <div id="intDigitsInput"></div>
                    </div>
                    <div class="form-row">
                        <label>随机小数位数</label>
                        <div id="decDigitsInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>符号模式</label>
                    <div id="signSelect"></div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="applyExampleBtn">应用示例</button>
                    <button id="randomBtn" class="secondary">生成随机</button>
                    <button id="runBtn" class="secondary">执行反转</button>
                    <button id="detailBtn" class="ghost">查看步骤</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">
                    reverseNumber 实现：<span class="mono">parseFloat(String(n).split('').reverse().join('')) * Math.sign(n)</span>
                </div>
            </div>

            <div class="card">
                <h2>结果与过程</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Result</div>
                            <div class="stage-sub">观察字符串反转、parseFloat、符号恢复的过程</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">等待执行</span>
                            <span id="modeChip" class="chip">示例</span>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">原值</div>
                            <div class="stat-value mono" id="beforeValue">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">字符串</div>
                            <div class="stat-value mono" id="beforeStr">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">反转字符串</div>
                            <div class="stat-value mono" id="reversedStr">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">结果</div>
                            <div class="stat-value mono" id="afterValue">-</div>
                        </div>
                    </div>

                    <div id="logBox" class="log"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script>
        const reverseNumber = n =>
            parseFloat(`${n}`.split('').reverse().join('')) * Math.sign(n);

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                example: null,
                exampleNative: null,
                sign: null,
                signNative: null
            },
            inputs: {
                number: null,
                intDigits: null,
                decDigits: null
            },
            checkboxOptions: [],
            last: null
        };

        const examples = {
            posInt: { label: '正整数 12345', value: 12345 },
            negInt: { label: '负整数 -1200', value: -1200 },
            posDec: { label: '小数 12.340', value: 12.34 },
            negDec: { label: '负小数 -10.05', value: -10.05 },
            tiny: { label: '极小值 0.0003', value: 0.0003 }
        };

        const exampleOptions = Object.entries(examples).map(([value, item]) => ({ value, label: item.label }));
        const signOptions = [
            { value: 'keep', label: '保持符号' },
            { value: 'forcePlus', label: '强制正数' },
            { value: 'forceMinus', label: '强制负数' }
        ];

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoApplyExample', label: '选择示例自动应用', checked: true },
                { id: 'autoRun', label: '输入变化自动执行', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '用弹窗展示步骤', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const exampleContainer = document.getElementById('exampleSelect');
            const signContainer = document.getElementById('signSelect');

            if (exampleContainer) {
                try {
                    state.selects.example = new Select({
                        container: exampleContainer,
                        options: exampleOptions,
                        placeholder: '选择示例',
                        onChange: () => {
                            if (getCheckboxValue('autoApplyExample')) applyExample();
                        }
                    });
                    state.selects.example.setValue('posInt');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    exampleOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'posInt';
                    select.addEventListener('change', () => {
                        if (getCheckboxValue('autoApplyExample')) applyExample();
                    });
                    exampleContainer.appendChild(select);
                    state.selects.exampleNative = select;
                }
            }

            if (signContainer) {
                try {
                    state.selects.sign = new Select({
                        container: signContainer,
                        options: signOptions,
                        placeholder: '选择符号模式',
                        onChange: () => {
                            if (getCheckboxValue('autoRun')) run();
                        }
                    });
                    state.selects.sign.setValue('keep');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    signOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'keep';
                    select.addEventListener('change', () => {
                        if (getCheckboxValue('autoRun')) run();
                    });
                    signContainer.appendChild(select);
                    state.selects.signNative = select;
                }
            }
        }

        function getExampleKey() {
            if (state.selects.example && typeof state.selects.example.getValue === 'function') {
                return state.selects.example.getValue() || 'posInt';
            }
            return state.selects.exampleNative ? state.selects.exampleNative.value : 'posInt';
        }

        function getSignMode() {
            if (state.selects.sign && typeof state.selects.sign.getValue === 'function') {
                return state.selects.sign.getValue() || 'keep';
            }
            return state.selects.signNative ? state.selects.signNative.value : 'keep';
        }

        function setupInputs() {
            const numberContainer = document.getElementById('numberInput');
            const intDigitsContainer = document.getElementById('intDigitsInput');
            const decDigitsContainer = document.getElementById('decDigitsInput');

            if (numberContainer) {
                try {
                    state.inputs.number = new InputNumber({
                        container: numberContainer,
                        min: -999999999,
                        max: 999999999,
                        step: 0.01,
                        precision: 8,
                        value: 12345,
                        onChange: () => {
                            if (getCheckboxValue('autoRun')) run();
                        }
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.step = '0.01';
                    input.value = '12345';
                    input.className = 'input-field';
                    input.id = 'numberNative';
                    numberContainer.appendChild(input);
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoRun')) run();
                    });
                }
            }

            if (intDigitsContainer) {
                try {
                    state.inputs.intDigits = new InputNumber({
                        container: intDigitsContainer,
                        min: 1,
                        max: 12,
                        step: 1,
                        value: 5,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '1';
                    input.max = '12';
                    input.step = '1';
                    input.value = '5';
                    input.className = 'input-field';
                    input.id = 'intDigitsNative';
                    intDigitsContainer.appendChild(input);
                }
            }

            if (decDigitsContainer) {
                try {
                    state.inputs.decDigits = new InputNumber({
                        container: decDigitsContainer,
                        min: 0,
                        max: 8,
                        step: 1,
                        value: 2,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '8';
                    input.step = '1';
                    input.value = '2';
                    input.className = 'input-field';
                    input.id = 'decDigitsNative';
                    decDigitsContainer.appendChild(input);
                }
            }
        }

        function getNumberValue() {
            if (state.inputs.number && typeof state.inputs.number.getValue === 'function') {
                try {
                    return Number(state.inputs.number.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('numberNative');
            return native ? Number(native.value) : 0;
        }

        function getIntDigits() {
            if (state.inputs.intDigits && typeof state.inputs.intDigits.getValue === 'function') {
                try {
                    return Number(state.inputs.intDigits.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('intDigitsNative');
            return native ? Number(native.value) : 1;
        }

        function getDecDigits() {
            if (state.inputs.decDigits && typeof state.inputs.decDigits.getValue === 'function') {
                try {
                    return Number(state.inputs.decDigits.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('decDigitsNative');
            return native ? Number(native.value) : 0;
        }

        function setInputValue(plugin, fallbackId, value) {
            if (plugin && typeof plugin.setValue === 'function') {
                try {
                    plugin.setValue(value);
                } catch (e) {}
            }
            const native = document.getElementById(fallbackId);
            if (native) native.value = String(value);
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        function setLog(html) {
            const box = document.getElementById('logBox');
            if (box) box.innerHTML = html;
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeSign(n) {
            const mode = getSignMode();
            if (mode === 'forcePlus') return Math.abs(n);
            if (mode === 'forceMinus') return -Math.abs(n);
            return n;
        }

        function applyExample() {
            const key = getExampleKey();
            const ex = examples[key] || examples.posInt;
            setInputValue(state.inputs.number, 'numberNative', ex.value);
            setChip('modeChip', '示例');
            showNotification('已应用示例', 'info');
            if (getCheckboxValue('autoRun')) run();
        }

        function buildRandomNumber(intDigits, decDigits) {
            const intLen = Math.min(12, Math.max(1, Math.round(intDigits)));
            const decLen = Math.min(8, Math.max(0, Math.round(decDigits)));
            let intPart = '';
            for (let i = 0; i < intLen; i++) {
                const d = i === 0 ? 1 + Math.floor(Math.random() * 9) : Math.floor(Math.random() * 10);
                intPart += String(d);
            }
            let decPart = '';
            for (let i = 0; i < decLen; i++) {
                decPart += String(Math.floor(Math.random() * 10));
            }
            const base = decLen ? `${intPart}.${decPart}` : intPart;
            const n = Number(base);
            const signMode = getSignMode();
            const signed = signMode === 'forceMinus'
                ? -Math.abs(n)
                : signMode === 'forcePlus'
                    ? Math.abs(n)
                    : (Math.random() > 0.5 ? n : -n);
            return signed;
        }

        function randomize() {
            const n = buildRandomNumber(getIntDigits(), getDecDigits());
            setInputValue(state.inputs.number, 'numberNative', n);
            setChip('modeChip', '随机');
            showNotification('已生成随机数', 'success');
            if (getCheckboxValue('autoRun')) run();
        }

        function computeSteps(rawNumber) {
            const n = normalizeSign(rawNumber);
            const inputStr = `${n}`;
            const reversedStr = inputStr.split('').reverse().join('');
            const parsed = parseFloat(reversedStr);
            const result = parsed * Math.sign(n);
            return { n, inputStr, reversedStr, parsed, result };
        }

        function run() {
            const raw = getNumberValue();
            if (!Number.isFinite(raw)) {
                setChip('statusChip', '非法输入', 'warn');
                setText('beforeValue', '-');
                setText('beforeStr', '-');
                setText('reversedStr', '-');
                setText('afterValue', '-');
                setLog('');
                showNotification('请输入合法数字', 'warning');
                state.last = null;
                return;
            }

            const steps = computeSteps(raw);
            state.last = { raw, ...steps };
            setChip('statusChip', '已执行', 'ok');
            setText('beforeValue', String(steps.n));
            setText('beforeStr', steps.inputStr);
            setText('reversedStr', steps.reversedStr);
            setText('afterValue', String(steps.result));

            const html = `
                <div>raw：<strong>${escapeHtml(String(raw))}</strong></div>
                <div>normalizeSign：<strong>${escapeHtml(String(steps.n))}</strong></div>
                <div>String(n)：<strong>${escapeHtml(steps.inputStr)}</strong></div>
                <div>reverse：<strong>${escapeHtml(steps.reversedStr)}</strong></div>
                <div>parseFloat：<strong>${escapeHtml(String(steps.parsed))}</strong></div>
                <div>Math.sign(n)：<strong>${escapeHtml(String(Math.sign(steps.n)))}</strong></div>
                <div>result：<strong>${escapeHtml(String(steps.result))}</strong></div>
            `;
            setLog(html);

            if (getCheckboxValue('showNotifications')) {
                showNotification(`结果：${steps.result}`, 'info');
            }
        }

        function showDetail() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            if (!state.last) {
                showNotification('请先执行一次', 'warning');
                return;
            }
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">反转步骤</div>
                    <div style="margin-bottom:8px;">raw：<span style="font-family:JetBrains Mono, monospace;">${escapeHtml(String(state.last.raw))}</span></div>
                    <div style="margin-bottom:8px;">n：<span style="font-family:JetBrains Mono, monospace;">${escapeHtml(String(state.last.n))}</span></div>
                    <div style="margin-bottom:8px;">String(n)：<span style="font-family:JetBrains Mono, monospace;">${escapeHtml(state.last.inputStr)}</span></div>
                    <div style="margin-bottom:8px;">reversed：<span style="font-family:JetBrains Mono, monospace;">${escapeHtml(state.last.reversedStr)}</span></div>
                    <div style="margin-bottom:8px;">parseFloat：<span style="font-family:JetBrains Mono, monospace;">${escapeHtml(String(state.last.parsed))}</span></div>
                    <div style="margin-bottom:8px;">result：<span style="font-family:JetBrains Mono, monospace;">${escapeHtml(String(state.last.result))}</span></div>
                </div>
            `;
            showModal(content);
        }

        function resetAll() {
            setInputValue(state.inputs.number, 'numberNative', 12345);
            setInputValue(state.inputs.intDigits, 'intDigitsNative', 5);
            setInputValue(state.inputs.decDigits, 'decDigitsNative', 2);
            setChip('statusChip', '等待执行', 'ok');
            setChip('modeChip', '示例');
            setText('beforeValue', '-');
            setText('beforeStr', '-');
            setText('reversedStr', '-');
            setText('afterValue', '-');
            setLog('');
            state.last = null;
            showNotification('已重置', 'info');
            if (getCheckboxValue('autoRun')) run();
        }

        function bindEvents() {
            const applyExampleBtn = document.getElementById('applyExampleBtn');
            const randomBtn = document.getElementById('randomBtn');
            const runBtn = document.getElementById('runBtn');
            const detailBtn = document.getElementById('detailBtn');
            const resetBtn = document.getElementById('resetBtn');
            if (applyExampleBtn) applyExampleBtn.addEventListener('click', applyExample);
            if (randomBtn) randomBtn.addEventListener('click', randomize);
            if (runBtn) runBtn.addEventListener('click', run);
            if (detailBtn) detailBtn.addEventListener('click', showDetail);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            applyExample();
            run();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
