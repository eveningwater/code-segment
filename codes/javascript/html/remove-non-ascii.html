<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>remove-non-ascii</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        textarea.input {
            width: 100%;
            min-height: 160px;
            resize: vertical;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            background: #f8fafc;
            color: #0f172a;
        }
        textarea.input:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
            background: #ffffff;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 820px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .highlight {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 160px;
        }
        .highlight strong {
            color: #fbbf24;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>removeNonASCII 自定义插件演示</h1>
            </div>
            <div class="subtitle">用 InputNumber / Select / Checkbox / Modal / Notification 构建“去除非 ASCII 字符”示例</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>输入与配置</h2>

                <div class="form-row">
                    <label>示例选择</label>
                    <div id="exampleSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>随机长度</label>
                        <div id="lengthInput"></div>
                    </div>
                    <div class="form-row">
                        <label>注入非 ASCII 数量</label>
                        <div id="injectInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="applyExampleBtn">应用示例</button>
                    <button id="runBtn" class="secondary">执行清洗</button>
                    <button id="detailBtn" class="ghost">查看详情</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">
                    说明：removeNonASCII 会移除 ASCII 可见字符范围之外的字符（保留 0x20~0x7E）。
                </div>
            </div>

            <div class="card">
                <h2>清洗结果</h2>
                <div class="row-2">
                    <div class="form-row">
                        <label>原始文本</label>
                        <textarea id="inputText" class="input" placeholder="输入包含 emoji / 中文 / 控制字符 的文本..."></textarea>
                    </div>
                    <div class="form-row">
                        <label>清洗后文本</label>
                        <textarea id="outputText" class="input" readonly placeholder="执行后输出..."></textarea>
                    </div>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">原始长度</div>
                        <div class="stat-value" id="beforeLen">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">清洗后长度</div>
                        <div class="stat-value" id="afterLen">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">移除数量</div>
                        <div class="stat-value" id="removedCount">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">状态</div>
                        <div class="stat-value" id="statusValue">等待执行</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>高亮预览</h2>
                <div class="hint">可选：将“被移除字符”用高亮标记展示。</div>
                <div id="highlightBox" class="highlight mono"></div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script>
        const removeNonASCII = str => str.replace(/[^\x20-\x7E]/g, '');

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                example: null,
                exampleNative: null
            },
            inputs: {
                length: null,
                inject: null
            },
            checkboxOptions: [],
            last: null
        };

        const examples = {
            mixed: {
                label: '混合文本（中文+emoji+控制字符）',
                value: 'Hello，世界 🌍\nLine2\tTab\t✅\u0007Bell'
            },
            url: {
                label: 'URL + Emoji',
                value: 'https://example.com/path?q=hello🌟&lang=中文'
            },
            onlyAscii: {
                label: '纯 ASCII',
                value: 'The quick brown fox jumps over the lazy dog! 1234567890'
            },
            random: {
                label: '随机生成（按配置）',
                value: ''
            }
        };

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (error) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupSelect() {
            const container = document.getElementById('exampleSelect');
            if (!container) return;
            const options = Object.entries(examples).map(([value, item]) => ({ value, label: item.label }));
            try {
                state.selects.example = new Select({
                    container,
                    options,
                    placeholder: '选择示例',
                    onChange: () => {
                        if (getCheckboxValue('autoApplyExample')) applySelectedExample();
                    }
                });
                state.selects.example.setValue('mixed');
            } catch (error) {
                const select = document.createElement('select');
                select.className = 'input-field';
                options.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'mixed';
                select.addEventListener('change', () => {
                    if (getCheckboxValue('autoApplyExample')) applySelectedExample();
                });
                container.appendChild(select);
                state.selects.exampleNative = select;
            }
        }

        function getExampleKey() {
            if (state.selects.example && typeof state.selects.example.getValue === 'function') {
                return state.selects.example.getValue() || 'mixed';
            }
            return state.selects.exampleNative ? state.selects.exampleNative.value : 'mixed';
        }

        function setupInputNumbers() {
            const lengthContainer = document.getElementById('lengthInput');
            const injectContainer = document.getElementById('injectInput');

            if (lengthContainer) {
                try {
                    state.inputs.length = new InputNumber({
                        container: lengthContainer,
                        min: 10,
                        max: 400,
                        step: 1,
                        value: 80,
                        onChange: () => {
                            if (getCheckboxValue('autoApplyExample') && getExampleKey() === 'random') {
                                applySelectedExample();
                            }
                        }
                    });
                } catch (error) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '10';
                    input.max = '400';
                    input.step = '1';
                    input.value = '80';
                    input.className = 'input-field';
                    input.id = 'lengthInputNative';
                    lengthContainer.appendChild(input);
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoApplyExample') && getExampleKey() === 'random') {
                            applySelectedExample();
                        }
                    });
                }
            }

            if (injectContainer) {
                try {
                    state.inputs.inject = new InputNumber({
                        container: injectContainer,
                        min: 0,
                        max: 120,
                        step: 1,
                        value: 12,
                        onChange: () => {
                            if (getCheckboxValue('autoApplyExample') && getExampleKey() === 'random') {
                                applySelectedExample();
                            }
                        }
                    });
                } catch (error) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '120';
                    input.step = '1';
                    input.value = '12';
                    input.className = 'input-field';
                    input.id = 'injectInputNative';
                    injectContainer.appendChild(input);
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoApplyExample') && getExampleKey() === 'random') {
                            applySelectedExample();
                        }
                    });
                }
            }
        }

        function getLengthValue() {
            if (state.inputs.length && typeof state.inputs.length.getValue === 'function') {
                try {
                    return Number(state.inputs.length.getValue());
                } catch (error) {}
            }
            const native = document.getElementById('lengthInputNative');
            return native ? Number(native.value) : 0;
        }

        function getInjectValue() {
            if (state.inputs.inject && typeof state.inputs.inject.getValue === 'function') {
                try {
                    return Number(state.inputs.inject.getValue());
                } catch (error) {}
            }
            const native = document.getElementById('injectInputNative');
            return native ? Number(native.value) : 0;
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;

            const options = [
                { id: 'autoApplyExample', label: '选择示例自动应用', checked: true },
                { id: 'autoRun', label: '输入变化自动清洗', checked: true },
                { id: 'highlightRemoved', label: '高亮被移除字符', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '用弹窗展示详情', checked: true }
            ];

            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (error) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (error) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function isASCIIVisibleChar(code) {
            return code >= 0x20 && code <= 0x7E;
        }

        function buildRandomString(len, injectCount) {
            const ascii = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-!?@#$%^&*()[]{};:,. /\\|+=';
            const nonAsciiChars = ['中文', '🌟', '✅', 'π', 'Ж', '€', '™', '©', '😊', '\u0007', '\u0000', '\u000B'];
            const arr = [];
            const safeLen = Math.max(0, Math.min(400, Math.round(len)));
            for (let i = 0; i < safeLen; i++) {
                arr.push(ascii[Math.floor(Math.random() * ascii.length)]);
            }
            const count = Math.max(0, Math.min(safeLen, Math.round(injectCount)));
            for (let i = 0; i < count; i++) {
                const idx = Math.floor(Math.random() * safeLen);
                const inject = nonAsciiChars[Math.floor(Math.random() * nonAsciiChars.length)];
                arr[idx] = inject;
            }
            return arr.join('');
        }

        function applySelectedExample() {
            const key = getExampleKey();
            const input = document.getElementById('inputText');
            if (!input) return;
            if (key === 'random') {
                input.value = buildRandomString(getLengthValue(), getInjectValue());
            } else {
                input.value = examples[key]?.value ?? '';
            }
            showNotification('已应用示例', 'info');
            if (getCheckboxValue('autoRun')) run();
        }

        function updateUI(payload) {
            document.getElementById('beforeLen').textContent = payload.beforeLenText;
            document.getElementById('afterLen').textContent = payload.afterLenText;
            document.getElementById('removedCount').textContent = payload.removedCountText;
            document.getElementById('statusValue').textContent = payload.statusText;
            const highlightBox = document.getElementById('highlightBox');
            if (highlightBox) highlightBox.innerHTML = payload.highlightHtml;
        }

        function buildHighlightHtml(source) {
            const parts = [];
            for (let i = 0; i < source.length; i++) {
                const char = source[i];
                const code = source.charCodeAt(i);
                if (isASCIIVisibleChar(code)) {
                    parts.push(escapeHtml(char));
                } else {
                    const display = char === '\u0000' ? '\\0' : char === '\u0007' ? '\\a' : char === '\u000B' ? '\\v' : char;
                    parts.push(`<strong>${escapeHtml(display)}</strong>`);
                }
            }
            return parts.join('');
        }

        function run() {
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            if (!input || !output) return;
            const raw = input.value || '';
            const cleaned = removeNonASCII(raw);
            output.value = cleaned;

            const beforeLen = raw.length;
            const afterLen = cleaned.length;
            const removedCount = Math.max(0, beforeLen - afterLen);
            const highlightHtml = getCheckboxValue('highlightRemoved') ? buildHighlightHtml(raw) : escapeHtml(raw);

            state.last = {
                before: raw,
                after: cleaned,
                beforeLen,
                afterLen,
                removedCount
            };

            updateUI({
                beforeLenText: String(beforeLen),
                afterLenText: String(afterLen),
                removedCountText: String(removedCount),
                statusText: removedCount ? '已清洗' : '无需清洗',
                highlightHtml
            });

            if (removedCount) {
                showNotification(`已移除 ${removedCount} 个字符`, 'success');
            } else {
                showNotification('没有非 ASCII 字符', 'info');
            }
        }

        function showDetail() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('详情弹窗已关闭', 'info');
                return;
            }
            const last = state.last;
            if (!last) {
                showNotification('请先执行清洗', 'warning');
                return;
            }
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">清洗详情</div>
                    <div style="margin-bottom:8px;">原始长度：<strong>${last.beforeLen}</strong></div>
                    <div style="margin-bottom:8px;">清洗后长度：<strong>${last.afterLen}</strong></div>
                    <div style="margin-bottom:8px;">移除数量：<strong>${last.removedCount}</strong></div>
                    <div style="margin-top:12px; font-weight:900;">清洗后文本</div>
                    <div style="margin-top:8px; padding:10px 12px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0; font-family:JetBrains Mono, monospace; white-space:pre-wrap; word-break:break-word;">${escapeHtml(last.after)}</div>
                </div>
            `;
            showModal(content);
        }

        function resetAll() {
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            if (input) input.value = '';
            if (output) output.value = '';
            state.last = null;
            updateUI({
                beforeLenText: '0',
                afterLenText: '0',
                removedCountText: '0',
                statusText: '已重置',
                highlightHtml: ''
            });
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const applyBtn = document.getElementById('applyExampleBtn');
            const runBtn = document.getElementById('runBtn');
            const detailBtn = document.getElementById('detailBtn');
            const resetBtn = document.getElementById('resetBtn');
            const input = document.getElementById('inputText');
            if (applyBtn) applyBtn.addEventListener('click', applySelectedExample);
            if (runBtn) runBtn.addEventListener('click', run);
            if (detailBtn) detailBtn.addEventListener('click', showDetail);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
            if (input) {
                input.addEventListener('input', () => {
                    if (getCheckboxValue('autoRun')) run();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'Enter') run();
                });
            }
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelect();
            setupInputNumbers();
            bindEvents();
            resetAll();
            applySelectedExample();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
