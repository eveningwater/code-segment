<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>run-async</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        textarea.input {
            width: 100%;
            min-height: 160px;
            resize: vertical;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 12px;
            font-size: 13px;
            line-height: 1.6;
            outline: none;
            background: #0f172a;
            color: #f8fafc;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        textarea.input:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }
        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .log {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 260px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .progress {
            height: 10px;
            width: 100%;
            background: #e2e8f0;
            border-radius: 999px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2563eb 0%, #14b8a6 100%);
            transition: width 0.12s ease;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>runAsync 自定义插件演示</h1>
            </div>
            <div class="subtitle">用 Worker 在后台执行函数，并用插件替代原生提示/输入</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>任务模板</label>
                    <div id="taskSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>循环规模 (n)</label>
                        <div id="nInput"></div>
                    </div>
                    <div class="form-row">
                        <label>并发任务数</label>
                        <div id="countInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="runOneBtn" class="secondary">执行一次</button>
                    <button id="runManyBtn" class="secondary">并发执行</button>
                    <button id="showCodeBtn" class="ghost">查看 Worker 代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="form-row">
                    <label>函数体预览（将被丢进 Worker 执行）</label>
                    <textarea id="fnPreview" class="input" readonly></textarea>
                </div>

                <div class="hint">
                    注意：传入 Worker 的函数会被序列化为字符串执行，无法访问外部变量（示例里会展示 typeof outsideVariable）。
                </div>
            </div>

            <div class="card">
                <h2>执行状态</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Runs</div>
                            <div class="stage-sub">观察成功 / 失败 / 被忽略</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">空闲</span>
                            <span id="modeChip" class="chip">单次</span>
                        </div>
                    </div>

                    <div class="progress"><div id="progressBar" class="bar"></div></div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">总任务数</div>
                            <div class="stat-value" id="totalRuns">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">完成数</div>
                            <div class="stat-value" id="doneRuns">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">失败数</div>
                            <div class="stat-value" id="errorRuns">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">忽略数</div>
                            <div class="stat-value" id="ignoredRuns">0</div>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>日志</label>
                        <div id="logBox" class="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const runAsync = (fn, payload) => {
            const fnSource = typeof fn === 'function' ? `(${fn})` : String(fn);
            const workerCode = `self.onmessage = (event) => {
  try {
    const payload = event.data;
    const result = (${fnSource})(payload);
    Promise.resolve(result).then(
      (data) => self.postMessage({ ok: true, data }),
      (err) => self.postMessage({ ok: false, error: String(err && err.message ? err.message : err) })
    );
  } catch (err) {
    self.postMessage({ ok: false, error: String(err && err.message ? err.message : err) });
  }
};`;
            const worker = new Worker(
                URL.createObjectURL(
                    new Blob([workerCode], { type: 'application/javascript;charset=utf-8' })
                )
            );
            return {
                worker,
                workerCode,
                promise: new Promise((resolve, reject) => {
                    worker.onmessage = ({ data }) => {
                        if (data && data.ok) resolve(data.data);
                        else reject(new Error(data && data.error ? data.error : 'Worker error'));
                        worker.terminate();
                    };
                    worker.onerror = (err) => {
                        reject(err);
                        worker.terminate();
                    };
                    worker.postMessage(payload);
                })
            };
        };

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                task: null,
                taskNative: null
            },
            inputs: {
                n: null,
                count: null
            },
            checkboxOptions: [],
            runId: 0,
            counters: { total: 0, done: 0, error: 0, ignored: 0 },
            lastWorkerCode: '',
            progressTimer: null
        };

        const tasks = {
            sumLoops: {
                label: '三重循环累加（CPU 密集）',
                fn: (payload) => {
                    const n = Math.max(1, Math.min(500, payload.n | 0));
                    let result = 0;
                    for (let i = 0; i < n; i++) {
                        for (let j = 0; j < n; j++) {
                            for (let k = 0; k < n; k++) {
                                result = result + i + j + k;
                            }
                        }
                    }
                    return { n, result };
                }
            },
            pow: {
                label: '快速计算 10 ** n（示例）',
                fn: (payload) => {
                    const n = Math.max(0, Math.min(12, payload.n | 0));
                    return 10 ** n;
                }
            },
            outside: {
                label: '外部变量不可访问（typeof outsideVariable）',
                fn: () => {
                    return typeof outsideVariable;
                }
            },
            asyncWait: {
                label: '异步 Promise（setTimeout）',
                fn: (payload) => {
                    const delay = Math.max(0, Math.min(2000, payload.n * 10));
                    return new Promise((resolve) => setTimeout(() => resolve({ delay, ok: true }), delay));
                }
            }
        };

        const taskOptions = Object.entries(tasks).map(([value, item]) => ({ value, label: item.label }));

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'terminatePrevious', label: '开始新任务时终止旧任务', checked: true },
                { id: 'ignoreOldResults', label: '忽略旧任务结果（runId）', checked: true },
                { id: 'autoScrollLog', label: '日志自动滚动', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '用弹窗展示 Worker 代码', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const container = document.getElementById('taskSelect');
            if (!container) return;
            try {
                state.selects.task = new Select({
                    container,
                    options: taskOptions,
                    placeholder: '选择任务',
                    onChange: () => {
                        syncFnPreview();
                    }
                });
                state.selects.task.setValue('sumLoops');
            } catch (e) {
                const select = document.createElement('select');
                select.className = 'input-field';
                taskOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'sumLoops';
                select.addEventListener('change', () => syncFnPreview());
                container.appendChild(select);
                state.selects.taskNative = select;
            }
        }

        function getTaskKey() {
            if (state.selects.task && typeof state.selects.task.getValue === 'function') {
                return state.selects.task.getValue() || 'sumLoops';
            }
            return state.selects.taskNative ? state.selects.taskNative.value : 'sumLoops';
        }

        function setupInputs() {
            const nContainer = document.getElementById('nInput');
            const countContainer = document.getElementById('countInput');

            if (nContainer) {
                try {
                    state.inputs.n = new InputNumber({
                        container: nContainer,
                        min: 0,
                        max: 500,
                        step: 1,
                        value: 120,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '500';
                    input.step = '1';
                    input.value = '120';
                    input.className = 'input-field';
                    input.id = 'nNative';
                    nContainer.appendChild(input);
                }
            }

            if (countContainer) {
                try {
                    state.inputs.count = new InputNumber({
                        container: countContainer,
                        min: 1,
                        max: 12,
                        step: 1,
                        value: 4,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '1';
                    input.max = '12';
                    input.step = '1';
                    input.value = '4';
                    input.className = 'input-field';
                    input.id = 'countNative';
                    countContainer.appendChild(input);
                }
            }
        }

        function getNValue() {
            if (state.inputs.n && typeof state.inputs.n.getValue === 'function') {
                try {
                    return Number(state.inputs.n.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('nNative');
            return native ? Number(native.value) : 0;
        }

        function getCountValue() {
            if (state.inputs.count && typeof state.inputs.count.getValue === 'function') {
                try {
                    return Number(state.inputs.count.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('countNative');
            return native ? Number(native.value) : 1;
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            if (getCheckboxValue('autoScrollLog')) {
                box.scrollTop = box.scrollHeight;
            }
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function updateStats() {
            document.getElementById('totalRuns').textContent = String(state.counters.total);
            document.getElementById('doneRuns').textContent = String(state.counters.done);
            document.getElementById('errorRuns').textContent = String(state.counters.error);
            document.getElementById('ignoredRuns').textContent = String(state.counters.ignored);
        }

        function resetProgress() {
            const bar = document.getElementById('progressBar');
            if (bar) bar.style.width = '0%';
            if (state.progressTimer) {
                clearInterval(state.progressTimer);
                state.progressTimer = null;
            }
        }

        function startProgress(runId) {
            resetProgress();
            const bar = document.getElementById('progressBar');
            if (!bar) return;
            const start = performance.now();
            state.progressTimer = setInterval(() => {
                if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) return;
                const elapsed = performance.now() - start;
                const pct = Math.min(95, Math.max(0, (elapsed / 1200) * 100));
                bar.style.width = `${pct.toFixed(1)}%`;
            }, 80);
        }

        function finishProgress() {
            const bar = document.getElementById('progressBar');
            if (bar) bar.style.width = '100%';
            if (state.progressTimer) {
                clearInterval(state.progressTimer);
                state.progressTimer = null;
            }
            setTimeout(() => {
                if (bar) bar.style.width = '0%';
            }, 260);
        }

        function syncFnPreview() {
            const key = getTaskKey();
            const fn = tasks[key]?.fn;
            const box = document.getElementById('fnPreview');
            if (box) box.value = fn ? String(fn) : '';
        }

        function formatResult(val) {
            if (val === undefined) return 'undefined';
            if (val === null) return 'null';
            if (typeof val === 'string') return val;
            if (typeof val === 'number' || typeof val === 'boolean') return String(val);
            try {
                return JSON.stringify(val);
            } catch (e) {
                return String(val);
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function createPayload() {
            return { n: Math.round(getNValue()) };
        }

        async function runOne() {
            const key = getTaskKey();
            const task = tasks[key];
            if (!task) return;
            state.runId += 1;
            const runId = state.runId;
            setChip('statusChip', '执行中', 'warn');
            setChip('modeChip', '单次');
            startProgress(runId);
            state.counters.total += 1;
            updateStats();
            addLog(`run#${runId} start -> ${key} (n=${Math.round(getNValue())})`);

            const { promise, workerCode } = runAsync(task.fn, createPayload());
            state.lastWorkerCode = workerCode;
            try {
                const result = await promise;
                if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) {
                    state.counters.ignored += 1;
                    updateStats();
                    addLog(`run#${runId} ignored`);
                    return;
                }
                finishProgress();
                state.counters.done += 1;
                updateStats();
                setChip('statusChip', '完成', 'ok');
                addLog(`run#${runId} done -> ${formatResult(result)}`);
                showNotification('已完成', 'success');
            } catch (err) {
                if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) {
                    state.counters.ignored += 1;
                    updateStats();
                    addLog(`run#${runId} ignored (error)`);
                    return;
                }
                finishProgress();
                state.counters.error += 1;
                updateStats();
                setChip('statusChip', '失败', 'warn');
                addLog(`run#${runId} error -> ${String(err && err.message ? err.message : err)}`);
                showNotification('执行失败', 'error');
            }
        }

        async function runMany() {
            const key = getTaskKey();
            const task = tasks[key];
            if (!task) return;
            const count = Math.min(12, Math.max(1, Math.round(getCountValue())));
            state.runId += 1;
            const runId = state.runId;
            setChip('statusChip', '执行中', 'warn');
            setChip('modeChip', `并发 x${count}`);
            startProgress(runId);
            state.counters.total += count;
            updateStats();
            addLog(`run#${runId} batch start -> ${key} x${count}`);

            const payload = createPayload();
            const runners = Array.from({ length: count }).map((_, idx) => {
                const { promise, workerCode } = runAsync(task.fn, payload);
                if (!state.lastWorkerCode) state.lastWorkerCode = workerCode;
                return promise.then(
                    (data) => ({ ok: true, idx, data }),
                    (error) => ({ ok: false, idx, error: String(error && error.message ? error.message : error) })
                );
            });

            const results = await Promise.all(runners);
            if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) {
                state.counters.ignored += count;
                updateStats();
                addLog(`run#${runId} batch ignored`);
                return;
            }

            finishProgress();
            const okCount = results.filter(r => r.ok).length;
            const errCount = results.length - okCount;
            state.counters.done += okCount;
            state.counters.error += errCount;
            updateStats();

            setChip('statusChip', errCount ? '部分失败' : '完成', errCount ? 'warn' : 'ok');
            const sample = results.slice(0, 3).map(r => r.ok ? `${r.idx}:ok` : `${r.idx}:err`).join(' | ');
            addLog(`run#${runId} batch done -> ok=${okCount}, err=${errCount} (${sample})`);
            showNotification(`并发完成：ok=${okCount}, err=${errCount}`, errCount ? 'warning' : 'success');
        }

        function showWorkerCode() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(state.lastWorkerCode || '(empty)');
            const escaped = escapeHtml(code);
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">Worker 代码</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="worker" class="language-javascript">${escaped}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="worker"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function resetAll() {
            state.runId += 1;
            state.counters.total = 0;
            state.counters.done = 0;
            state.counters.error = 0;
            state.counters.ignored = 0;
            updateStats();
            clearLog();
            resetProgress();
            setChip('statusChip', '空闲', 'ok');
            setChip('modeChip', '单次');
            syncFnPreview();
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const runOneBtn = document.getElementById('runOneBtn');
            const runManyBtn = document.getElementById('runManyBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            if (runOneBtn) runOneBtn.addEventListener('click', runOne);
            if (runManyBtn) runManyBtn.addEventListener('click', runMany);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showWorkerCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            syncFnPreview();
            resetAll();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
