<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sample</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        textarea.input {
            width: 100%;
            min-height: 160px;
            resize: vertical;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            background: #f8fafc;
            color: #0f172a;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        textarea.input:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
            background: #ffffff;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }
        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            align-content: start;
        }
        .item {
            border-radius: 14px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            padding: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .item:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.10);
        }
        .item-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            white-space: nowrap;
        }
        .item-value {
            color: #334155;
            font-size: 12px;
            line-height: 1.55;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            word-break: break-word;
        }
        .log {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 220px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>sample 自定义插件演示</h1>
            </div>
            <div class="subtitle">参照 run-promises-in-series：用插件驱动“随机抽样”，并用 highlight.js 展示代码</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>数组类型</label>
                    <div id="presetSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>数组长度</label>
                        <div id="lenInput"></div>
                    </div>
                    <div class="form-row">
                        <label>抽样次数</label>
                        <div id="timesInput"></div>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>随机种子</label>
                        <div id="seedInput"></div>
                    </div>
                    <div class="form-row">
                        <label>抽样模式</label>
                        <div id="modeSelect"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="buildBtn" class="ghost">生成数组</button>
                    <button id="sampleBtn" class="secondary">抽样一次</button>
                    <button id="sampleManyBtn" class="secondary">批量抽样</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="form-row">
                    <label>数组预览（JSON）</label>
                    <textarea id="arrayPreview" class="input" readonly></textarea>
                </div>

                <div class="hint">
                    提示：原始 sample 直接用 Math.random。为了可复现，这里提供“带种子随机”模式用于演示。
                </div>
            </div>

            <div class="card">
                <h2>抽样结果</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Samples</div>
                            <div class="stage-sub">点击任意样本卡片用 Modal 查看详情</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">就绪</span>
                            <span id="modeChip" class="chip">native</span>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">数组长度</div>
                            <div class="stat-value" id="lenValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">抽样次数</div>
                            <div class="stat-value" id="countValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">最近样本</div>
                            <div class="stat-value" id="lastValue">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">批量耗时</div>
                            <div class="stat-value" id="batchMs">-</div>
                        </div>
                    </div>

                    <div id="sampleList" class="list"></div>

                    <div class="form-row">
                        <label>日志</label>
                        <div id="logBox" class="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const sample = arr => arr[Math.floor(Math.random() * arr.length)];

        const sampleWithRng = (arr, rng) => arr[Math.floor(rng() * arr.length)];

        const mulberry32 = (seed) => {
            let t = seed >>> 0;
            return function () {
                t += 0x6d2b79f5;
                let x = Math.imul(t ^ (t >>> 15), 1 | t);
                x ^= x + Math.imul(x ^ (x >>> 7), 61 | x);
                return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
            };
        };

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                preset: null,
                presetNative: null,
                mode: null,
                modeNative: null
            },
            inputs: {
                len: null,
                times: null,
                seed: null
            },
            checkboxOptions: [],
            arr: [],
            samples: [],
            last: null
        };

        const presets = {
            numbers: { label: '数字数组', builder: (len) => Array.from({ length: len }, (_, i) => i + 1) },
            letters: { label: '字母数组', builder: (len) => Array.from({ length: len }, (_, i) => String.fromCharCode(65 + (i % 26)) + i) },
            objects: { label: '对象数组', builder: (len) => Array.from({ length: len }, (_, i) => ({ id: i + 1, name: `item_${i + 1}` })) }
        };

        const presetOptions = Object.entries(presets).map(([value, item]) => ({ value, label: item.label }));
        const modeOptions = [
            { value: 'native', label: '原版 Math.random' },
            { value: 'seeded', label: '带种子随机（可复现）' }
        ];

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoBuild', label: '配置变化自动生成数组', checked: true },
                { id: 'autoScrollLog', label: '日志自动滚动', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const presetContainer = document.getElementById('presetSelect');
            const modeContainer = document.getElementById('modeSelect');

            if (presetContainer) {
                try {
                    state.selects.preset = new Select({
                        container: presetContainer,
                        options: presetOptions,
                        placeholder: '选择数组类型',
                        onChange: () => {
                            if (getCheckboxValue('autoBuild')) buildArray();
                        }
                    });
                    state.selects.preset.setValue('numbers');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    presetOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'numbers';
                    select.addEventListener('change', () => {
                        if (getCheckboxValue('autoBuild')) buildArray();
                    });
                    presetContainer.appendChild(select);
                    state.selects.presetNative = select;
                }
            }

            if (modeContainer) {
                try {
                    state.selects.mode = new Select({
                        container: modeContainer,
                        options: modeOptions,
                        placeholder: '选择模式',
                        onChange: () => {
                            syncModeChip();
                        }
                    });
                    state.selects.mode.setValue('native');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    modeOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'native';
                    select.addEventListener('change', () => syncModeChip());
                    modeContainer.appendChild(select);
                    state.selects.modeNative = select;
                }
            }
        }

        function getPresetKey() {
            if (state.selects.preset && typeof state.selects.preset.getValue === 'function') {
                return state.selects.preset.getValue() || 'numbers';
            }
            return state.selects.presetNative ? state.selects.presetNative.value : 'numbers';
        }

        function getModeKey() {
            if (state.selects.mode && typeof state.selects.mode.getValue === 'function') {
                return state.selects.mode.getValue() || 'native';
            }
            return state.selects.modeNative ? state.selects.modeNative.value : 'native';
        }

        function setupInputs() {
            const lenContainer = document.getElementById('lenInput');
            const timesContainer = document.getElementById('timesInput');
            const seedContainer = document.getElementById('seedInput');

            if (lenContainer) {
                try {
                    state.inputs.len = new InputNumber({
                        container: lenContainer,
                        min: 0,
                        max: 200,
                        step: 1,
                        value: 20,
                        onChange: () => {
                            if (getCheckboxValue('autoBuild')) buildArray();
                        }
                    });
                } catch (e) {}
            }

            if (timesContainer) {
                try {
                    state.inputs.times = new InputNumber({
                        container: timesContainer,
                        min: 1,
                        max: 5000,
                        step: 1,
                        value: 200,
                        onChange: () => {}
                    });
                } catch (e) {}
            }

            if (seedContainer) {
                try {
                    state.inputs.seed = new InputNumber({
                        container: seedContainer,
                        min: 1,
                        max: 999999,
                        step: 1,
                        value: 42,
                        onChange: () => {}
                    });
                } catch (e) {}
            }
        }

        function getNumber(plugin, fallback, defaultValue) {
            if (plugin && typeof plugin.getValue === 'function') {
                try {
                    const n = Number(plugin.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            return defaultValue ?? fallback;
        }

        function getLen() {
            return Math.min(200, Math.max(0, Math.round(getNumber(state.inputs.len, 20, 20))));
        }

        function getTimes() {
            return Math.min(5000, Math.max(1, Math.round(getNumber(state.inputs.times, 200, 200))));
        }

        function getSeed() {
            return Math.min(999999, Math.max(1, Math.round(getNumber(state.inputs.seed, 42, 42))));
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = String(text);
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            if (getCheckboxValue('autoScrollLog')) box.scrollTop = box.scrollHeight;
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function syncModeChip() {
            const mode = getModeKey();
            setChip('modeChip', mode);
        }

        function updateStats() {
            setText('lenValue', state.arr.length);
            setText('countValue', state.samples.length);
            setText('lastValue', state.last === null || state.last === undefined ? '-' : String(state.last).slice(0, 80));
        }

        function renderArrayPreview() {
            const box = document.getElementById('arrayPreview');
            if (!box) return;
            try {
                box.value = JSON.stringify(state.arr, null, 2);
            } catch (e) {
                box.value = String(state.arr);
            }
        }

        function renderSamples() {
            const list = document.getElementById('sampleList');
            if (!list) return;
            list.innerHTML = '';
            state.samples.slice(-30).reverse().forEach((val, idx) => {
                const el = document.createElement('div');
                el.className = 'item';
                el.dataset.index = String(state.samples.length - 1 - idx);
                el.innerHTML = `
                    <div class="item-title">
                        <span>sample</span>
                        <span class="badge">#${state.samples.length - idx}</span>
                    </div>
                    <div class="item-value">${typeof val === 'object' ? JSON.stringify(val) : String(val)}</div>
                `;
                el.addEventListener('click', () => showSampleDetail(Number(el.dataset.index)));
                list.appendChild(el);
            });
        }

        function buildArray() {
            const presetKey = getPresetKey();
            const builder = presets[presetKey]?.builder;
            const len = getLen();
            state.arr = builder ? builder(len) : [];
            state.samples = [];
            state.last = null;
            renderArrayPreview();
            renderSamples();
            clearLog();
            setText('batchMs', '-');
            setChip('statusChip', len ? '数组已生成' : '空数组', len ? 'ok' : 'warn');
            updateStats();
            showNotification('已生成数组', 'info');
        }

        function doSampleOnce() {
            if (!state.arr.length) {
                setChip('statusChip', '空数组', 'warn');
                showNotification('数组为空，无法抽样', 'warning');
                return;
            }
            const mode = getModeKey();
            const val = mode === 'seeded'
                ? sampleWithRng(state.arr, mulberry32(getSeed()))
                : sample(state.arr);
            state.samples.push(val);
            state.last = val;
            setChip('statusChip', '已抽样', 'ok');
            setText('batchMs', '-');
            updateStats();
            renderSamples();
            addLog(`sample -> ${typeof val === 'object' ? JSON.stringify(val) : String(val)}`);
            showNotification('已抽样一次', 'success');
        }

        function doSampleMany() {
            if (!state.arr.length) {
                showNotification('数组为空，无法抽样', 'warning');
                return;
            }
            const times = getTimes();
            const mode = getModeKey();
            const t0 = performance.now();
            let val = null;
            let rng = null;
            if (mode === 'seeded') rng = mulberry32(getSeed());
            for (let i = 0; i < times; i++) {
                val = mode === 'seeded' ? sampleWithRng(state.arr, rng) : sample(state.arr);
                state.samples.push(val);
            }
            const ms = performance.now() - t0;
            state.last = val;
            setChip('statusChip', '批量完成', 'ok');
            setText('batchMs', `${ms.toFixed(2)} ms`);
            updateStats();
            renderSamples();
            addLog(`batch ${times} samples -> ${ms.toFixed(2)}ms`);
            showNotification(`批量完成：${times} 次`, 'success');
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function showCode() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(sample.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">sample</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="sample" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="sample"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function showSampleDetail(index) {
            const val = state.samples[index];
            if (val === undefined) return;
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">样本详情</div>
                    <div style="margin-bottom:8px;">index：<strong>${index}</strong></div>
                    <div style="margin-bottom:8px;">mode：<strong>${getModeKey()}</strong></div>
                    <div style="margin-top:10px; padding:10px 12px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0; font-family:JetBrains Mono, monospace; white-space:pre; overflow:auto;">${escapeHtml(typeof val === 'object' ? JSON.stringify(val, null, 2) : String(val))}</div>
                </div>
            `;
            showModal(content);
        }

        function resetAll() {
            state.arr = [];
            state.samples = [];
            state.last = null;
            renderArrayPreview();
            renderSamples();
            clearLog();
            setText('batchMs', '-');
            setChip('statusChip', '就绪', 'ok');
            syncModeChip();
            updateStats();
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const buildBtn = document.getElementById('buildBtn');
            const sampleBtn = document.getElementById('sampleBtn');
            const sampleManyBtn = document.getElementById('sampleManyBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            if (buildBtn) buildBtn.addEventListener('click', buildArray);
            if (sampleBtn) sampleBtn.addEventListener('click', doSampleOnce);
            if (sampleManyBtn) sampleManyBtn.addEventListener('click', doSampleMany);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            syncModeChip();
            buildArray();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
