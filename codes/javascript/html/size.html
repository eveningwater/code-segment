<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>size</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }

        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 13px;
            color: #475569;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: 440px 1fr;
            gap: 18px;
            align-items: start;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
        }

        .card h2 {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 108px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row label {
            font-size: 13px;
            color: #334155;
            font-weight: 800;
        }

        .text-input {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            outline: none;
            background: #ffffff;
            transition: border-color 0.12s ease, box-shadow 0.12s ease;
        }

        .text-input:focus {
            border-color: rgba(37, 99, 235, 0.65);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.12s ease;
        }

        button:active {
            transform: translateY(1px);
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #0f172a;
            color: #fff;
        }

        .ghost {
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .chip-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }

        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }

        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }

        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }

        .result {
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            min-height: 300px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .hint {
            font-size: 12px;
            color: #64748b;
            line-height: 1.6;
            margin-top: 10px;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>size 自定义插件演示</h1>
            </div>
            <div class="subtitle">size 会根据值类型返回长度：数组 length、对象 size/length/keys、字符串 Blob 大小(bytes)。</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>类型</label>
                    <div id="typeSelect"></div>
                </div>

                <div class="form-row">
                    <label>模板</label>
                    <div id="presetSelect"></div>
                </div>

                <div class="form-row" id="stringRow">
                    <label>字符串</label>
                    <input id="stringInput" class="text-input" value="hello 世界" />
                </div>

                <div class="row-2" id="arrayRow">
                    <div class="form-row">
                        <label>数组长度</label>
                        <div id="arrayLenInput"></div>
                    </div>
                    <div class="form-row">
                        <label>重复因子</label>
                        <div id="repeatInput"></div>
                    </div>
                </div>

                <div class="row-2" id="objectRow">
                    <div class="form-row">
                        <label>键数量</label>
                        <div id="keyCountInput"></div>
                    </div>
                    <div class="form-row">
                        <label>length 字段</label>
                        <div id="objLenInput"></div>
                    </div>
                </div>

                <div class="form-row" id="collectionRow">
                    <label>集合大小</label>
                    <div id="collectionSizeInput"></div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="calcBtn" class="primary">计算 size</button>
                    <button id="randomBtn" class="secondary">随机示例</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">提示：字符串分支返回的是字节大小（UTF-8），可能与字符数不同。</div>
            </div>

            <div class="card">
                <h2>输出</h2>
                <div class="stage">
                    <div class="chip-row">
                        <span id="statusChip" class="chip ok">就绪</span>
                        <span id="typeChip" class="chip">type: -</span>
                        <span id="sizeChip" class="chip">size: -</span>
                        <span id="branchChip" class="chip">branch: -</span>
                    </div>
                    <pre id="resultBox" class="result"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const size = val =>
            Array.isArray(val)
                ? val.length
                : val && typeof val === 'object'
                    ? val.size || val.length || Object.keys(val).length
                    : typeof val === 'string'
                        ? new Blob([val]).size
                        : 0;

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                type: null,
                typeNative: null,
                preset: null,
                presetNative: null
            },
            inputs: {
                arrayLen: null,
                arrayLenNative: null,
                repeat: null,
                repeatNative: null,
                keyCount: null,
                keyCountNative: null,
                objLen: null,
                objLenNative: null,
                collectionSize: null,
                collectionSizeNative: null
            },
            optionDefs: [],
            last: { type: '-', branch: '-', size: 0, value: null }
        };

        const typeOptions = [
            { value: 'array', label: 'Array（length）' },
            { value: 'object', label: 'Object（size/length/keys）' },
            { value: 'set', label: 'Set（size）' },
            { value: 'map', label: 'Map（size）' },
            { value: 'arrayLike', label: 'Array-like（{length}）' },
            { value: 'string', label: 'String（Blob bytes）' }
        ];

        const presetOptionsByType = {
            array: [
                { value: 'small', label: '小数组（len=5）' },
                { value: 'big', label: '大数组（len=20）' }
            ],
            object: [
                { value: 'plain', label: '普通对象（keys）' },
                { value: 'withLength', label: '含 length 字段对象（length 优先）' }
            ],
            set: [
                { value: 'set5', label: 'Set size=5' },
                { value: 'set12', label: 'Set size=12' }
            ],
            map: [
                { value: 'map5', label: 'Map size=5' },
                { value: 'map12', label: 'Map size=12' }
            ],
            arrayLike: [
                { value: 'al3', label: 'length=3' },
                { value: 'al9', label: 'length=9' }
            ],
            string: [
                { value: 'ascii', label: 'ASCII（hello world）' },
                { value: 'unicode', label: 'Unicode（hello 世界）' }
            ]
        };

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getOption('showNotifications')) return;
            if (state.plugins.notification) {
                try {
                    state.plugins.notification.show(message, type);
                    return;
                } catch (e) {}
            }
            console.log(message);
        }

        function showModal(content) {
            if (state.plugins.modal) {
                try {
                    state.plugins.modal.alert(content);
                    return;
                } catch (e) {}
            }
            console.log(String(content).replace(/<[^>]*>/g, ''));
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = String(text);
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setRowVisible(id, visible) {
            const el = document.getElementById(id);
            if (el) el.style.display = visible ? '' : 'none';
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoRun', label: '输入变化自动计算', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.optionDefs = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getOption(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.optionDefs.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const typeContainer = document.getElementById('typeSelect');
            if (typeContainer) {
                try {
                    state.selects.type = new Select({
                        container: typeContainer,
                        options: typeOptions,
                        placeholder: '选择类型',
                        onChange: () => {
                            syncUIByType();
                            syncPresetOptions();
                            applyPreset();
                            if (getOption('autoRun')) calc();
                        }
                    });
                    state.selects.type.setValue('array');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'text-input';
                    typeOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'array';
                    select.addEventListener('change', () => {
                        syncUIByType();
                        syncPresetOptions();
                        applyPreset();
                        if (getOption('autoRun')) calc();
                    });
                    typeContainer.appendChild(select);
                    state.selects.typeNative = select;
                }
            }

            const presetContainer = document.getElementById('presetSelect');
            if (presetContainer) {
                try {
                    state.selects.preset = new Select({
                        container: presetContainer,
                        options: presetOptionsByType.array,
                        placeholder: '选择模板',
                        onChange: () => {
                            applyPreset();
                            if (getOption('autoRun')) calc();
                        }
                    });
                    state.selects.preset.setValue('small');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'text-input';
                    presetOptionsByType.array.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'small';
                    select.addEventListener('change', () => {
                        applyPreset();
                        if (getOption('autoRun')) calc();
                    });
                    presetContainer.appendChild(select);
                    state.selects.presetNative = select;
                }
            }
        }

        function getTypeKey() {
            if (state.selects.type && typeof state.selects.type.getValue === 'function') {
                try {
                    return state.selects.type.getValue() || 'array';
                } catch (e) {}
            }
            return state.selects.typeNative ? state.selects.typeNative.value : 'array';
        }

        function getPresetKey() {
            if (state.selects.preset && typeof state.selects.preset.getValue === 'function') {
                try {
                    return state.selects.preset.getValue() || '';
                } catch (e) {}
            }
            return state.selects.presetNative ? state.selects.presetNative.value : '';
        }

        function syncPresetOptions() {
            const type = getTypeKey();
            const options = presetOptionsByType[type] || presetOptionsByType.array;
            if (state.selects.preset && typeof state.selects.preset.setOptions === 'function') {
                try {
                    state.selects.preset.setOptions(options);
                    state.selects.preset.setValue(options[0]?.value || '');
                    return;
                } catch (e) {}
            }
            if (state.selects.presetNative) {
                state.selects.presetNative.innerHTML = '';
                options.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt.value;
                    o.textContent = opt.label;
                    state.selects.presetNative.appendChild(o);
                });
                state.selects.presetNative.value = options[0]?.value || '';
            }
        }

        function setupInputs() {
            setupNumberInput('arrayLenInput', 'arrayLen', 0, 60, 1, 8);
            setupNumberInput('repeatInput', 'repeat', 1, 12, 1, 3);
            setupNumberInput('keyCountInput', 'keyCount', 0, 80, 1, 6);
            setupNumberInput('objLenInput', 'objLen', 0, 300, 1, 0);
            setupNumberInput('collectionSizeInput', 'collectionSize', 0, 60, 1, 10);
        }

        function setupNumberInput(containerId, key, min, max, step, value) {
            const container = document.getElementById(containerId);
            if (!container) return;
            try {
                state.inputs[key] = new InputNumber({
                    container,
                    min,
                    max,
                    step,
                    value,
                    onChange: () => {
                        if (getOption('autoRun')) calc();
                    }
                });
            } catch (e) {
                const input = document.createElement('input');
                input.type = 'number';
                input.min = String(min);
                input.max = String(max);
                input.step = String(step);
                input.value = String(value);
                input.className = 'text-input';
                const nativeId = `${key}Native`;
                input.id = nativeId;
                input.addEventListener('input', () => {
                    if (getOption('autoRun')) calc();
                });
                container.appendChild(input);
                state.inputs[`${key}Native`] = input;
            }
        }

        function getNumber(key, fallback) {
            const plugin = state.inputs[key];
            const nativeEl = state.inputs[`${key}Native`];
            if (plugin && typeof plugin.getValue === 'function') {
                try {
                    const n = Number(plugin.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            if (nativeEl) {
                const n = Number(nativeEl.value);
                if (Number.isFinite(n)) return n;
            }
            return fallback;
        }

        function setNumber(key, value) {
            const plugin = state.inputs[key];
            const nativeEl = state.inputs[`${key}Native`];
            if (plugin && typeof plugin.setValue === 'function') {
                try {
                    plugin.setValue(value);
                    return;
                } catch (e) {}
            }
            if (nativeEl) nativeEl.value = String(value);
        }

        function syncUIByType() {
            const type = getTypeKey();
            setRowVisible('stringRow', type === 'string');
            setRowVisible('arrayRow', type === 'array');
            setRowVisible('objectRow', type === 'object' || type === 'arrayLike');
            setRowVisible('collectionRow', type === 'set' || type === 'map');
        }

        function buildValue() {
            const type = getTypeKey();
            const preset = getPresetKey();

            if (type === 'string') {
                const s = document.getElementById('stringInput')?.value ?? '';
                return { type, value: String(s), note: `string bytes (Blob UTF-8)` };
            }

            if (type === 'array') {
                const len = Math.max(0, Math.min(60, Math.round(getNumber('arrayLen', 8))));
                const repeat = Math.max(1, Math.min(12, Math.round(getNumber('repeat', 3))));
                const arr = Array.from({ length: len }, (_, i) => (i % repeat));
                return { type, value: arr, note: `array length` };
            }

            if (type === 'set') {
                const n = Math.max(0, Math.min(60, Math.round(getNumber('collectionSize', 10))));
                const set = new Set(Array.from({ length: n }, (_, i) => i));
                return { type, value: set, note: `object.size` };
            }

            if (type === 'map') {
                const n = Math.max(0, Math.min(60, Math.round(getNumber('collectionSize', 10))));
                const map = new Map(Array.from({ length: n }, (_, i) => [`k${i}`, i]));
                return { type, value: map, note: `object.size` };
            }

            if (type === 'arrayLike') {
                const length = Math.max(0, Math.min(300, Math.round(getNumber('objLen', 9))));
                const obj = { length };
                const keys = Math.max(0, Math.min(80, Math.round(getNumber('keyCount', 0))));
                for (let i = 0; i < keys; i++) obj[`k${i}`] = i;
                return { type, value: obj, note: `object.length` };
            }

            const keys = Math.max(0, Math.min(80, Math.round(getNumber('keyCount', 6))));
            const obj = {};
            for (let i = 0; i < keys; i++) obj[`k${i}`] = i;
            const objLen = Math.max(0, Math.min(300, Math.round(getNumber('objLen', 0))));
            if (preset === 'withLength' || objLen > 0) obj.length = objLen || 7;
            return { type, value: obj, note: `object.size || object.length || keys` };
        }

        function detectBranch(val) {
            if (Array.isArray(val)) return 'array.length';
            if (val && typeof val === 'object') {
                if (typeof val.size === 'number') return 'object.size';
                if (typeof val.length === 'number') return 'object.length';
                return 'Object.keys(obj).length';
            }
            if (typeof val === 'string') return 'Blob(bytes)';
            return '0';
        }

        function formatValue(val) {
            if (val === null) return 'null';
            if (val === undefined) return 'undefined';
            if (typeof val === 'string') return val;
            if (Array.isArray(val)) return JSON.stringify(val, null, 2);
            if (val instanceof Set) return `Set(${val.size}) ` + JSON.stringify(Array.from(val), null, 2);
            if (val instanceof Map) return `Map(${val.size}) ` + JSON.stringify(Array.from(val.entries()), null, 2);
            try {
                return JSON.stringify(val, null, 2);
            } catch (e) {
                return String(val);
            }
        }

        function render() {
            const box = document.getElementById('resultBox');
            if (!box) return;
            const { type, branch, size: sz, value } = state.last;
            const lines = [];
            lines.push(`type: ${type}`);
            lines.push(`branch: ${branch}`);
            lines.push(`size(val): ${sz}`);
            lines.push('');
            lines.push('value:');
            lines.push(formatValue(value));
            box.textContent = lines.join('\n');
            setChip('typeChip', `type: ${type}`);
            setChip('branchChip', `branch: ${branch}`);
            setChip('sizeChip', `size: ${sz}`, sz ? ' ok' : ' warn');
        }

        function calc() {
            try {
                const built = buildValue();
                const val = built.value;
                const branch = detectBranch(val);
                const sz = size(val);
                state.last = { type: built.type, branch, size: sz, value: val };
                setChip('statusChip', '完成', 'ok');
                render();
                showNotification('已计算 size', 'success');
            } catch (e) {
                const msg = String(e && e.message ? e.message : e);
                setChip('statusChip', '失败', 'warn');
                render();
                showNotification('计算失败', 'error');
                showModal(`<div style="padding:12px 8px; font-size:14px; color:#1f2937;"><div style="font-weight:900; margin-bottom:10px;">计算失败</div><pre style="margin:0; padding:12px; border-radius:12px; background:#0b1220; color:#e2e8f0; overflow:auto; line-height:1.55; font-size:12px;">${escapeHtml(msg)}</pre></div>`);
            }
        }

        function applyPreset() {
            const type = getTypeKey();
            const preset = getPresetKey();

            if (type === 'string') {
                const input = document.getElementById('stringInput');
                if (input) input.value = preset === 'ascii' ? 'hello world' : 'hello 世界';
                return;
            }

            if (type === 'array') {
                if (preset === 'small') {
                    setNumber('arrayLen', 5);
                    setNumber('repeat', 3);
                } else {
                    setNumber('arrayLen', 20);
                    setNumber('repeat', 7);
                }
                return;
            }

            if (type === 'set') {
                setNumber('collectionSize', preset === 'set12' ? 12 : 5);
                return;
            }

            if (type === 'map') {
                setNumber('collectionSize', preset === 'map12' ? 12 : 5);
                return;
            }

            if (type === 'arrayLike') {
                setNumber('objLen', preset === 'al9' ? 9 : 3);
                setNumber('keyCount', 0);
                return;
            }

            if (type === 'object') {
                if (preset === 'withLength') {
                    setNumber('keyCount', 4);
                    setNumber('objLen', 7);
                } else {
                    setNumber('keyCount', 6);
                    setNumber('objLen', 0);
                }
            }
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function randomExample() {
            const type = getTypeKey();
            if (type === 'string') {
                const input = document.getElementById('stringInput');
                if (input) input.value = Math.random() > 0.5 ? 'hi' : '你好，世界';
                if (getOption('autoRun')) calc();
                return;
            }
            if (type === 'array') {
                setNumber('arrayLen', randomInt(0, 30));
                setNumber('repeat', randomInt(1, 12));
                if (getOption('autoRun')) calc();
                return;
            }
            if (type === 'set' || type === 'map') {
                setNumber('collectionSize', randomInt(0, 30));
                if (getOption('autoRun')) calc();
                return;
            }
            if (type === 'arrayLike') {
                setNumber('objLen', randomInt(0, 60));
                setNumber('keyCount', randomInt(0, 10));
                if (getOption('autoRun')) calc();
                return;
            }
            setNumber('keyCount', randomInt(0, 20));
            setNumber('objLen', Math.random() > 0.65 ? randomInt(1, 30) : 0);
            if (getOption('autoRun')) calc();
        }

        function showCode() {
            if (!getOption('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(size.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">size</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="size" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="size"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function resetAll() {
            if (state.selects.type && typeof state.selects.type.setValue === 'function') {
                try {
                    state.selects.type.setValue('array');
                } catch (e) {}
            }
            if (state.selects.typeNative) state.selects.typeNative.value = 'array';
            syncUIByType();
            syncPresetOptions();
            applyPreset();
            const input = document.getElementById('stringInput');
            if (input) input.value = 'hello 世界';
            state.last = { type: '-', branch: '-', size: 0, value: null };
            setChip('statusChip', '就绪', 'ok');
            render();
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const calcBtn = document.getElementById('calcBtn');
            const randomBtn = document.getElementById('randomBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const stringInput = document.getElementById('stringInput');

            if (calcBtn) calcBtn.addEventListener('click', calc);
            if (randomBtn) randomBtn.addEventListener('click', randomExample);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
            if (stringInput) stringInput.addEventListener('input', () => {
                if (getOption('autoRun')) calc();
            });
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            syncUIByType();
            syncPresetOptions();
            applyPreset();
            render();
            if (getOption('autoRun')) calc();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
