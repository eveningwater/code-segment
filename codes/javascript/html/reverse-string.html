<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reverse-string</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        textarea.input {
            width: 100%;
            min-height: 180px;
            resize: vertical;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            background: #f8fafc;
            color: #0f172a;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        textarea.input:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
            background: #ffffff;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }
        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .log {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 220px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .example-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .example-card {
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #ffffff;
            border-radius: 14px;
            padding: 12px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-align: left;
        }
        .example-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.10);
        }
        .example-title {
            font-weight: 900;
            margin-bottom: 6px;
        }
        .example-desc {
            color: #64748b;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>reverseString + on 事件委托演示</h1>
            </div>
            <div class="subtitle">参照 on.ts：用 on() 做事件绑定/委托，并用插件替代原生交互</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>输入与配置</h2>

                <div class="form-row">
                    <label>示例选择</label>
                    <div id="exampleSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>批量执行次数</label>
                        <div id="repeatInput"></div>
                    </div>
                    <div class="form-row">
                        <label>事件模式</label>
                        <div id="eventModeSelect"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="applyExampleBtn">应用示例</button>
                    <button id="runBtn" class="secondary">执行反转</button>
                    <button id="batchBtn" class="secondary">批量执行</button>
                    <button id="detailBtn" class="ghost">查看详情</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="form-row">
                    <label>输入文本</label>
                    <textarea id="inputText" class="input" placeholder="输入任意文本，支持 emoji / 中文 / 组合字符…"></textarea>
                </div>

                <div class="hint">
                    提示：示例卡片点击采用 on() 的事件委托；也可切换为直接绑定模式对比。
                </div>
            </div>

            <div class="card">
                <h2>输出与过程</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Output</div>
                            <div class="stage-sub">reverseString: [...str].reverse().join('')</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">等待执行</span>
                            <span id="modeChip" class="chip">委托</span>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">输入长度</div>
                            <div class="stat-value" id="inLen">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">输出长度</div>
                            <div class="stat-value" id="outLen">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">批量用时</div>
                            <div class="stat-value" id="batchMs">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">最近输出</div>
                            <div class="stat-value" id="lastOut">-</div>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>输出文本</label>
                        <textarea id="outputText" class="input" readonly placeholder="执行后输出..."></textarea>
                    </div>

                    <div class="form-row">
                        <label>日志</label>
                        <div id="logBox" class="log"></div>
                    </div>

                    <div class="form-row">
                        <label>示例卡片（点击应用）</label>
                        <div id="exampleCards" class="example-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script>
        const reverseString = str => [...str].reverse().join('');

        const on = (el, type, handler, opts = {}) => {
            const delegatorFn = e => e.target.matches(opts.target) && handler.call(e.target, e);
            if (el && type && typeof handler === 'function') {
                el.addEventListener(type, opts.target ? delegatorFn : handler, opts.capture || false);
                if (opts.target) return delegatorFn;
            }
        };

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                example: null,
                exampleNative: null,
                eventMode: null,
                eventModeNative: null
            },
            inputs: {
                repeat: null
            },
            checkboxOptions: [],
            last: null,
            directCardHandlers: []
        };

        const examples = {
            hello: { label: 'Hello', value: 'Hello World!' },
            zh: { label: '中文', value: '你好，世界' },
            emoji: { label: 'Emoji', value: '🙂🙃😉😊😇' },
            mix: { label: '混合', value: 'A🇨🇳B é (e + 组合音符) 👨‍👩‍👧‍👦' }
        };

        const exampleOptions = Object.entries(examples).map(([value, item]) => ({ value, label: item.label }));
        const eventModeOptions = [
            { value: 'delegate', label: '事件委托（on + target）' },
            { value: 'direct', label: '直接绑定（逐个 addEventListener）' }
        ];

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoApplyExample', label: '选择示例自动应用', checked: true },
                { id: 'autoRun', label: '输入变化自动执行', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '用弹窗展示详情', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const exampleContainer = document.getElementById('exampleSelect');
            const modeContainer = document.getElementById('eventModeSelect');

            if (exampleContainer) {
                try {
                    state.selects.example = new Select({
                        container: exampleContainer,
                        options: exampleOptions,
                        placeholder: '选择示例',
                        onChange: () => {
                            if (getCheckboxValue('autoApplyExample')) applyExample();
                        }
                    });
                    state.selects.example.setValue('hello');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    exampleOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'hello';
                    select.addEventListener('change', () => {
                        if (getCheckboxValue('autoApplyExample')) applyExample();
                    });
                    exampleContainer.appendChild(select);
                    state.selects.exampleNative = select;
                }
            }

            if (modeContainer) {
                try {
                    state.selects.eventMode = new Select({
                        container: modeContainer,
                        options: eventModeOptions,
                        placeholder: '选择事件模式',
                        onChange: () => {
                            setupExampleCards();
                        }
                    });
                    state.selects.eventMode.setValue('delegate');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    eventModeOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'delegate';
                    select.addEventListener('change', () => setupExampleCards());
                    modeContainer.appendChild(select);
                    state.selects.eventModeNative = select;
                }
            }
        }

        function getExampleKey() {
            if (state.selects.example && typeof state.selects.example.getValue === 'function') {
                return state.selects.example.getValue() || 'hello';
            }
            return state.selects.exampleNative ? state.selects.exampleNative.value : 'hello';
        }

        function getEventMode() {
            if (state.selects.eventMode && typeof state.selects.eventMode.getValue === 'function') {
                return state.selects.eventMode.getValue() || 'delegate';
            }
            return state.selects.eventModeNative ? state.selects.eventModeNative.value : 'delegate';
        }

        function setupInputs() {
            const container = document.getElementById('repeatInput');
            if (!container) return;
            try {
                state.inputs.repeat = new InputNumber({
                    container,
                    min: 1,
                    max: 5000,
                    step: 1,
                    value: 200,
                    onChange: () => {}
                });
            } catch (e) {
                const input = document.createElement('input');
                input.type = 'number';
                input.min = '1';
                input.max = '5000';
                input.step = '1';
                input.value = '200';
                input.className = 'input-field';
                input.id = 'repeatNative';
                container.appendChild(input);
            }
        }

        function getRepeatValue() {
            if (state.inputs.repeat && typeof state.inputs.repeat.getValue === 'function') {
                try {
                    return Number(state.inputs.repeat.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('repeatNative');
            return native ? Number(native.value) : 1;
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = String(text);
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            box.scrollTop = box.scrollHeight;
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function applyExample() {
            const key = getExampleKey();
            const ex = examples[key] || examples.hello;
            const input = document.getElementById('inputText');
            if (!input) return;
            input.value = ex.value;
            showNotification('已应用示例', 'info');
            if (getCheckboxValue('autoRun')) run();
        }

        function run() {
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            if (!input || !output) return;
            const raw = input.value ?? '';
            const out = reverseString(raw);
            output.value = out;
            setChip('statusChip', '已执行', 'ok');
            setText('inLen', raw.length);
            setText('outLen', out.length);
            setText('batchMs', '-');
            setText('lastOut', out.slice(0, 80));
            addLog(`reverse once -> len ${raw.length} => ${out.length}`);
        }

        function batchRun() {
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            if (!input || !output) return;
            const raw = input.value ?? '';
            const times = Math.min(5000, Math.max(1, Math.round(getRepeatValue())));
            const t0 = performance.now();
            let out = '';
            for (let i = 0; i < times; i++) {
                out = reverseString(raw);
            }
            const ms = performance.now() - t0;
            output.value = out;
            setChip('statusChip', '批量完成', 'ok');
            setText('inLen', raw.length);
            setText('outLen', out.length);
            setText('batchMs', `${ms.toFixed(2)} ms`);
            setText('lastOut', out.slice(0, 80));
            addLog(`batch ${times} runs -> ${ms.toFixed(2)}ms`);
            showNotification(`批量完成：${times} 次`, 'success');
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function showDetail() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            const raw = input ? input.value : '';
            const out = output ? output.value : '';
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">反转详情</div>
                    <div style="margin-bottom:8px;">输入长度：<strong>${raw.length}</strong>，输出长度：<strong>${out.length}</strong></div>
                    <div style="margin-top:12px; font-weight:900;">输入</div>
                    <div style="margin-top:8px; padding:10px 12px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0; font-family:JetBrains Mono, monospace; white-space:pre-wrap; word-break:break-word;">${escapeHtml(raw)}</div>
                    <div style="margin-top:12px; font-weight:900;">输出</div>
                    <div style="margin-top:8px; padding:10px 12px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0; font-family:JetBrains Mono, monospace; white-space:pre-wrap; word-break:break-word;">${escapeHtml(out)}</div>
                </div>
            `;
            showModal(content);
        }

        function resetAll() {
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            if (input) input.value = '';
            if (output) output.value = '';
            clearLog();
            setChip('statusChip', '等待执行', 'ok');
            setText('inLen', 0);
            setText('outLen', 0);
            setText('batchMs', '-');
            setText('lastOut', '-');
            showNotification('已重置', 'info');
        }

        function renderExampleCards() {
            const wrap = document.getElementById('exampleCards');
            if (!wrap) return;
            wrap.innerHTML = '';
            Object.entries(examples).forEach(([key, item]) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'example-card';
                btn.dataset.example = key;
                btn.innerHTML = `<div class="example-title">${item.label}</div><div class="example-desc">${escapeHtml(item.value.slice(0, 40))}</div>`;
                wrap.appendChild(btn);
            });
        }

        function detachDirectCardHandlers() {
            const wrap = document.getElementById('exampleCards');
            if (!wrap) return;
            const cards = Array.from(wrap.querySelectorAll('.example-card'));
            cards.forEach((card, idx) => {
                const handler = state.directCardHandlers[idx];
                if (handler) card.removeEventListener('click', handler);
            });
            state.directCardHandlers = [];
        }

        function setupExampleCards() {
            renderExampleCards();
            detachDirectCardHandlers();

            const mode = getEventMode();
            setChip('modeChip', mode === 'delegate' ? '委托' : '直接');

            const wrap = document.getElementById('exampleCards');
            if (!wrap) return;
            if (mode === 'delegate') return;

            const cards = Array.from(wrap.querySelectorAll('.example-card'));
            cards.forEach(card => {
                const handler = () => {
                    const key = card.dataset.example;
                    const input = document.getElementById('inputText');
                    if (!key || !input) return;
                    input.value = examples[key]?.value ?? '';
                    showNotification('已应用卡片示例（直接绑定）', 'info');
                    if (getCheckboxValue('autoRun')) run();
                };
                card.addEventListener('click', handler);
                state.directCardHandlers.push(handler);
            });
        }

        function bindEvents() {
            const applyExampleBtn = document.getElementById('applyExampleBtn');
            const runBtn = document.getElementById('runBtn');
            const batchBtn = document.getElementById('batchBtn');
            const detailBtn = document.getElementById('detailBtn');
            const resetBtn = document.getElementById('resetBtn');
            const input = document.getElementById('inputText');

            if (applyExampleBtn) applyExampleBtn.addEventListener('click', applyExample);
            if (runBtn) applyExampleBtn && runBtn.addEventListener('click', run);
            if (batchBtn) batchBtn.addEventListener('click', batchRun);
            if (detailBtn) detailBtn.addEventListener('click', showDetail);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);

            if (input) {
                input.addEventListener('input', () => {
                    if (getCheckboxValue('autoRun')) run();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 'Enter') run();
                });
            }

            const cards = document.getElementById('exampleCards');
            if (cards) {
                on(document, 'click', (e) => {
                    const key = e.currentTarget.dataset.example;
                    const input = document.getElementById('inputText');
                    if (!key || !input) return;
                    input.value = examples[key]?.value ?? '';
                    showNotification('已应用卡片示例（事件委托）', 'info');
                    if (getCheckboxValue('autoRun')) run();
                }, { target: '.example-card' });
            }
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            setupExampleCards();
            bindEvents();
            resetAll();
            applyExample();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
