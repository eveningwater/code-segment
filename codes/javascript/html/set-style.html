<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setStyle</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }

        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 18px;
            align-items: start;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
        }

        .card h2 {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 108px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-row label {
            font-size: 13px;
            color: #334155;
            font-weight: 800;
        }

        .input-field {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            outline: none;
            background: #ffffff;
            transition: border-color 0.12s ease, box-shadow 0.12s ease;
        }

        .input-field:focus {
            border-color: rgba(37, 99, 235, 0.65);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.12s ease;
        }

        button:active {
            transform: translateY(1px);
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #0f172a;
            color: #fff;
        }

        .ghost {
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }

        .chip {
            padding: 8px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .chip.ok {
            background: rgba(34, 197, 94, 0.14);
            color: #166534;
        }

        .chip.warn {
            background: rgba(245, 158, 11, 0.16);
            color: #92400e;
        }

        .stage {
            display: grid;
            gap: 14px;
        }

        .target-wrap {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
        }

        .target {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 64px;
            padding: 14px 18px;
            border-radius: 12px;
            background: #ffffff;
            border: 1px dashed rgba(15, 23, 42, 0.18);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 0.3px;
        }

        .log {
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            min-height: 220px;
            max-height: 320px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .hint {
            margin-top: 10px;
            font-size: 12px;
            color: #64748b;
            line-height: 1.6;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>setStyle 自定义插件演示</h1>
            </div>
            <div class="subtitle">参照 run-promises-in-series：用 Select / InputNumber / Checkbox / Modal / Notification 驱动对元素 style 的修改</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>样式项</label>
                    <div id="propSelect"></div>
                </div>

                <div class="form-row" id="colorRow">
                    <label>颜色值</label>
                    <div id="colorSelect"></div>
                </div>

                <div class="form-row" id="pxRow" style="display:none;">
                    <label>数值(px)</label>
                    <div id="pxInput"></div>
                </div>

                <div class="form-row" id="opacityRow" style="display:none;">
                    <label>透明度</label>
                    <div id="opacityInput"></div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="applyBtn" class="secondary">应用样式</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">setStyle(el, prop, val) 会直接写入 el.style[prop]。非原生表单控件（Select/Checkbox）会单独维护状态。</div>
            </div>

            <div class="card">
                <h2>预览与日志</h2>

                <div class="chip-row">
                    <span id="propChip" class="chip">prop: -</span>
                    <span id="valChip" class="chip">val: -</span>
                    <span id="statusChip" class="chip ok">就绪</span>
                </div>

                <div class="stage">
                    <div class="target-wrap">
                        <div id="target" class="target">点击“应用样式”观察变化</div>
                    </div>
                    <div id="logBox" class="log"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const setStyle = (el, prop, val) => el.style[prop] = val;

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                prop: null,
                propNative: null,
                color: null,
                colorNative: null
            },
            inputs: {
                px: null,
                pxNative: null,
                opacity: null,
                opacityNative: null
            },
            checkboxOptions: [],
            last: { prop: '', val: '' }
        };

        const propOptions = [
            { value: 'color', label: '文字颜色', kind: 'color', default: '#2563eb' },
            { value: 'backgroundColor', label: '背景颜色', kind: 'color', default: '#e0f2fe' },
            { value: 'fontSize', label: '字体大小 (px)', kind: 'px', default: 18 },
            { value: 'borderRadius', label: '圆角 (px)', kind: 'px', default: 12 },
            { value: 'opacity', label: '透明度 (0-1)', kind: 'opacity', default: 1 }
        ];

        const colorOptions = [
            { value: '#2563eb', label: '蓝色 #2563eb' },
            { value: '#0f172a', label: '深色 #0f172a' },
            { value: '#16a34a', label: '绿色 #16a34a' },
            { value: '#f97316', label: '橙色 #f97316' },
            { value: '#e11d48', label: '红色 #e11d48' },
            { value: '#e0f2fe', label: '浅蓝 #e0f2fe' },
            { value: '#f1f5f9', label: '浅灰 #f1f5f9' }
        ];

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                try {
                    state.plugins.notification.show(message, type);
                    return;
                } catch (e) {}
            }
            console.log(message);
        }

        function showModal(content) {
            if (state.plugins.modal) {
                try {
                    state.plugins.modal.alert(content);
                    return;
                } catch (e) {}
            }
            console.log(content);
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = String(text);
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            if (getCheckboxValue('autoScrollLog')) box.scrollTop = box.scrollHeight;
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoApply', label: '配置变化自动应用', checked: true },
                { id: 'autoScrollLog', label: '日志自动滚动', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const propContainer = document.getElementById('propSelect');
            if (propContainer) {
                try {
                    state.selects.prop = new Select({
                        container: propContainer,
                        options: propOptions.map(p => ({ value: p.value, label: p.label })),
                        placeholder: '选择样式项',
                        onChange: () => {
                            syncInputsByProp();
                            if (getCheckboxValue('autoApply')) applyStyle();
                        }
                    });
                    state.selects.prop.setValue('color');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    propOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'color';
                    select.addEventListener('change', () => {
                        syncInputsByProp();
                        if (getCheckboxValue('autoApply')) applyStyle();
                    });
                    propContainer.appendChild(select);
                    state.selects.propNative = select;
                }
            }

            const colorContainer = document.getElementById('colorSelect');
            if (colorContainer) {
                try {
                    state.selects.color = new Select({
                        container: colorContainer,
                        options: colorOptions,
                        placeholder: '选择颜色',
                        onChange: () => {
                            if (getCheckboxValue('autoApply')) applyStyle();
                        }
                    });
                    state.selects.color.setValue('#2563eb');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    colorOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = '#2563eb';
                    select.addEventListener('change', () => {
                        if (getCheckboxValue('autoApply')) applyStyle();
                    });
                    colorContainer.appendChild(select);
                    state.selects.colorNative = select;
                }
            }
        }

        function setupInputs() {
            const pxContainer = document.getElementById('pxInput');
            if (pxContainer) {
                try {
                    state.inputs.px = new InputNumber({
                        container: pxContainer,
                        min: 0,
                        max: 120,
                        step: 1,
                        value: 18,
                        onChange: () => {
                            if (getCheckboxValue('autoApply')) applyStyle();
                        }
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '120';
                    input.step = '1';
                    input.value = '18';
                    input.className = 'input-field';
                    input.id = 'pxNative';
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoApply')) applyStyle();
                    });
                    pxContainer.appendChild(input);
                    state.inputs.pxNative = input;
                }
            }

            const opacityContainer = document.getElementById('opacityInput');
            if (opacityContainer) {
                try {
                    state.inputs.opacity = new InputNumber({
                        container: opacityContainer,
                        min: 0,
                        max: 1,
                        step: 0.05,
                        value: 1,
                        precision: 2,
                        onChange: () => {
                            if (getCheckboxValue('autoApply')) applyStyle();
                        }
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '1';
                    input.step = '0.05';
                    input.value = '1';
                    input.className = 'input-field';
                    input.id = 'opacityNative';
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoApply')) applyStyle();
                    });
                    opacityContainer.appendChild(input);
                    state.inputs.opacityNative = input;
                }
            }
        }

        function getPropKey() {
            if (state.selects.prop && typeof state.selects.prop.getValue === 'function') {
                try {
                    return state.selects.prop.getValue() || 'color';
                } catch (e) {}
            }
            return state.selects.propNative ? state.selects.propNative.value : 'color';
        }

        function getColorValue() {
            if (state.selects.color && typeof state.selects.color.getValue === 'function') {
                try {
                    return state.selects.color.getValue() || '#2563eb';
                } catch (e) {}
            }
            return state.selects.colorNative ? state.selects.colorNative.value : '#2563eb';
        }

        function getPxValue(defaultValue) {
            if (state.inputs.px && typeof state.inputs.px.getValue === 'function') {
                try {
                    const n = Number(state.inputs.px.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            if (state.inputs.pxNative) {
                const n = Number(state.inputs.pxNative.value);
                if (Number.isFinite(n)) return n;
            }
            return defaultValue;
        }

        function getOpacityValue(defaultValue) {
            if (state.inputs.opacity && typeof state.inputs.opacity.getValue === 'function') {
                try {
                    const n = Number(state.inputs.opacity.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            if (state.inputs.opacityNative) {
                const n = Number(state.inputs.opacityNative.value);
                if (Number.isFinite(n)) return n;
            }
            return defaultValue;
        }

        function setPluginValue(plugin, nativeId, value) {
            if (plugin && typeof plugin.setValue === 'function') {
                try {
                    plugin.setValue(value);
                    return;
                } catch (e) {}
            }
            if (nativeId) {
                const el = document.getElementById(nativeId);
                if (el) el.value = String(value);
            }
        }

        function syncInputsByProp() {
            const prop = getPropKey();
            const def = propOptions.find(p => p.value === prop) || propOptions[0];

            const colorRow = document.getElementById('colorRow');
            const pxRow = document.getElementById('pxRow');
            const opacityRow = document.getElementById('opacityRow');
            if (colorRow) colorRow.style.display = def.kind === 'color' ? '' : 'none';
            if (pxRow) pxRow.style.display = def.kind === 'px' ? '' : 'none';
            if (opacityRow) opacityRow.style.display = def.kind === 'opacity' ? '' : 'none';

            if (def.kind === 'color') {
                if (state.selects.color && typeof state.selects.color.setValue === 'function') {
                    try {
                        state.selects.color.setValue(def.default);
                    } catch (e) {}
                }
                if (state.selects.colorNative) state.selects.colorNative.value = def.default;
            } else if (def.kind === 'px') {
                setPluginValue(state.inputs.px, 'pxNative', def.default);
            } else if (def.kind === 'opacity') {
                setPluginValue(state.inputs.opacity, 'opacityNative', def.default);
            }

            setChip('propChip', `prop: ${def.value}`);
            setChip('valChip', 'val: -');
        }

        function computeStyleValue(prop) {
            const def = propOptions.find(p => p.value === prop) || propOptions[0];
            if (def.kind === 'color') return { value: getColorValue(), raw: getColorValue() };
            if (def.kind === 'opacity') {
                const n = Math.max(0, Math.min(1, getOpacityValue(def.default)));
                return { value: String(n), raw: n };
            }
            const n = Math.max(0, Math.min(120, Math.round(getPxValue(def.default))));
            return { value: `${n}px`, raw: n };
        }

        function applyStyle() {
            const el = document.getElementById('target');
            if (!el) return;
            const prop = getPropKey();
            const computed = computeStyleValue(prop);
            try {
                setStyle(el, prop, computed.value);
                state.last = { prop, val: computed.value };
                setChip('statusChip', '已应用', 'ok');
                setChip('propChip', `prop: ${prop}`);
                setChip('valChip', `val: ${computed.value}`);
                addLog(`setStyle(target, "${prop}", "${computed.value}")`);
                showNotification('样式已应用', 'success');
            } catch (e) {
                setChip('statusChip', '失败', 'warn');
                const msg = String(e && e.message ? e.message : e);
                addLog(`error: ${msg}`);
                showNotification('应用失败', 'error');
                showModal(`<div style="padding:12px 8px; font-size:14px; color:#1f2937;"><div style="font-weight:900; margin-bottom:10px;">应用失败</div><pre style="margin:0; padding:12px; border-radius:12px; background:#0b1220; color:#e2e8f0; overflow:auto; line-height:1.55; font-size:12px;">${escapeHtml(msg)}</pre></div>`);
            }
        }

        function showCode() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(setStyle.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">setStyle</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="setStyle" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="setStyle"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function resetAll() {
            const el = document.getElementById('target');
            if (el) el.style.cssText = '';
            clearLog();
            setChip('statusChip', '就绪', 'ok');
            if (state.selects.prop && typeof state.selects.prop.setValue === 'function') {
                try {
                    state.selects.prop.setValue('color');
                } catch (e) {}
            }
            if (state.selects.propNative) state.selects.propNative.value = 'color';
            syncInputsByProp();
            addLog('reset');
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const applyBtn = document.getElementById('applyBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            if (applyBtn) applyBtn.addEventListener('click', applyStyle);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            syncInputsByProp();
            addLog('ready');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
