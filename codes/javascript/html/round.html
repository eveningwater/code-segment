<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>round</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }
        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .log {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 220px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .compare {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .compare-item {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            background: #f8fafc;
        }
        .compare-title {
            font-weight: 800;
            margin-bottom: 6px;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>round 自定义插件演示</h1>
            </div>
            <div class="subtitle">用 InputNumber / Select / Checkbox / Modal / Notification 观察小数位取整</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>输入与配置</h2>

                <div class="form-row">
                    <label>示例选择</label>
                    <div id="exampleSelect"></div>
                </div>

                <div class="form-row">
                    <label>输入数值</label>
                    <div id="numberInput"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>小数位数</label>
                        <div id="decimalsInput"></div>
                    </div>
                    <div class="form-row">
                        <label>批量次数</label>
                        <div id="repeatInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="applyExampleBtn">应用示例</button>
                    <button id="runBtn" class="secondary">执行 round</button>
                    <button id="batchBtn" class="secondary">批量执行</button>
                    <button id="detailBtn" class="ghost">查看详情</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">
                    round 实现：<span class="mono">Number(`${Math.round(`${n}e${decimals}`)}e-${decimals}`)</span>
                </div>
            </div>

            <div class="card">
                <h2>结果与对比</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Result</div>
                            <div class="stage-sub">对比 round / Math.round / toFixed</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">等待执行</span>
                            <span id="modeChip" class="chip">单次</span>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">输入</div>
                            <div class="stat-value" id="inputValue">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">小数位</div>
                            <div class="stat-value" id="decimalsValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">round 结果</div>
                            <div class="stat-value" id="roundValue">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">批量耗时</div>
                            <div class="stat-value" id="batchMs">-</div>
                        </div>
                    </div>

                    <div class="compare">
                        <div class="compare-item">
                            <div class="compare-title">Math.round</div>
                            <div class="mono" id="nativeRound">-</div>
                        </div>
                        <div class="compare-item">
                            <div class="compare-title">toFixed</div>
                            <div class="mono" id="fixedRound">-</div>
                        </div>
                        <div class="compare-item">
                            <div class="compare-title">round</div>
                            <div class="mono" id="customRound">-</div>
                        </div>
                    </div>

                    <div class="form-row">
                        <label>日志</label>
                        <div id="logBox" class="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script>
        const round = (n, decimals = 0) =>
            Number(`${Math.round(`${n}e${decimals}`)}e-${decimals}`);

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                example: null,
                exampleNative: null
            },
            inputs: {
                number: null,
                decimals: null,
                repeat: null
            },
            checkboxOptions: [],
            last: null
        };

        const examples = {
            basic: { label: '基础 12.3456', value: 12.3456, decimals: 2 },
            negative: { label: '负数 -9.876', value: -9.876, decimals: 1 },
            tiny: { label: '极小 0.00049', value: 0.00049, decimals: 4 },
            big: { label: '大数 123456.789', value: 123456.789, decimals: 3 }
        };

        const exampleOptions = Object.entries(examples).map(([value, item]) => ({ value, label: item.label }));

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoApplyExample', label: '选择示例自动应用', checked: true },
                { id: 'autoRun', label: '输入变化自动执行', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '用弹窗展示详情', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const exampleContainer = document.getElementById('exampleSelect');

            if (exampleContainer) {
                try {
                    state.selects.example = new Select({
                        container: exampleContainer,
                        options: exampleOptions,
                        placeholder: '选择示例',
                        onChange: () => {
                            if (getCheckboxValue('autoApplyExample')) applyExample();
                        }
                    });
                    state.selects.example.setValue('basic');
                } catch (e) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    exampleOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'basic';
                    select.addEventListener('change', () => {
                        if (getCheckboxValue('autoApplyExample')) applyExample();
                    });
                    exampleContainer.appendChild(select);
                    state.selects.exampleNative = select;
                }
            }
        }

        function getExampleKey() {
            if (state.selects.example && typeof state.selects.example.getValue === 'function') {
                return state.selects.example.getValue() || 'basic';
            }
            return state.selects.exampleNative ? state.selects.exampleNative.value : 'basic';
        }

        function setupInputs() {
            const numberContainer = document.getElementById('numberInput');
            const decimalsContainer = document.getElementById('decimalsInput');
            const repeatContainer = document.getElementById('repeatInput');

            if (numberContainer) {
                try {
                    state.inputs.number = new InputNumber({
                        container: numberContainer,
                        min: -999999999,
                        max: 999999999,
                        step: 0.0001,
                        precision: 8,
                        value: 12.3456,
                        onChange: () => {
                            if (getCheckboxValue('autoRun')) run();
                        }
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.step = '0.0001';
                    input.value = '12.3456';
                    input.className = 'input-field';
                    input.id = 'numberNative';
                    numberContainer.appendChild(input);
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoRun')) run();
                    });
                }
            }

            if (decimalsContainer) {
                try {
                    state.inputs.decimals = new InputNumber({
                        container: decimalsContainer,
                        min: 0,
                        max: 8,
                        step: 1,
                        value: 2,
                        onChange: () => {
                            if (getCheckboxValue('autoRun')) run();
                        }
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '8';
                    input.step = '1';
                    input.value = '2';
                    input.className = 'input-field';
                    input.id = 'decimalsNative';
                    decimalsContainer.appendChild(input);
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoRun')) run();
                    });
                }
            }

            if (repeatContainer) {
                try {
                    state.inputs.repeat = new InputNumber({
                        container: repeatContainer,
                        min: 1,
                        max: 5000,
                        step: 1,
                        value: 500,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '1';
                    input.max = '5000';
                    input.step = '1';
                    input.value = '500';
                    input.className = 'input-field';
                    input.id = 'repeatNative';
                    repeatContainer.appendChild(input);
                }
            }
        }

        function getNumberValue() {
            if (state.inputs.number && typeof state.inputs.number.getValue === 'function') {
                try {
                    return Number(state.inputs.number.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('numberNative');
            return native ? Number(native.value) : 0;
        }

        function getDecimalsValue() {
            if (state.inputs.decimals && typeof state.inputs.decimals.getValue === 'function') {
                try {
                    return Number(state.inputs.decimals.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('decimalsNative');
            return native ? Number(native.value) : 0;
        }

        function getRepeatValue() {
            if (state.inputs.repeat && typeof state.inputs.repeat.getValue === 'function') {
                try {
                    return Number(state.inputs.repeat.getValue());
                } catch (e) {}
            }
            const native = document.getElementById('repeatNative');
            return native ? Number(native.value) : 1;
        }

        function setInputValue(plugin, fallbackId, value) {
            if (plugin && typeof plugin.setValue === 'function') {
                try {
                    plugin.setValue(value);
                } catch (e) {}
            }
            const native = document.getElementById(fallbackId);
            if (native) native.value = String(value);
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = String(text);
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            box.scrollTop = box.scrollHeight;
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function applyExample() {
            const key = getExampleKey();
            const ex = examples[key] || examples.basic;
            setInputValue(state.inputs.number, 'numberNative', ex.value);
            setInputValue(state.inputs.decimals, 'decimalsNative', ex.decimals);
            setChip('modeChip', '示例');
            showNotification('已应用示例', 'info');
            if (getCheckboxValue('autoRun')) run();
        }

        function calcNativeRound(value, decimals) {
            const factor = 10 ** decimals;
            return Math.round(value * factor) / factor;
        }

        function calcFixed(value, decimals) {
            return Number(Number(value).toFixed(decimals));
        }

        function run() {
            const n = getNumberValue();
            const decimals = Math.max(0, Math.min(8, Math.round(getDecimalsValue())));
            if (!Number.isFinite(n)) {
                setChip('statusChip', '非法输入', 'warn');
                setText('inputValue', '-');
                setText('decimalsValue', decimals);
                setText('roundValue', '-');
                setText('batchMs', '-');
                setText('nativeRound', '-');
                setText('fixedRound', '-');
                setText('customRound', '-');
                showNotification('请输入合法数字', 'warning');
                return;
            }
            const res = round(n, decimals);
            const native = calcNativeRound(n, decimals);
            const fixed = calcFixed(n, decimals);

            state.last = { n, decimals, res, native, fixed };
            setChip('statusChip', '已执行', 'ok');
            setText('inputValue', n);
            setText('decimalsValue', decimals);
            setText('roundValue', res);
            setText('batchMs', '-');
            setText('nativeRound', native);
            setText('fixedRound', fixed);
            setText('customRound', res);
            addLog(`round(${n}, ${decimals}) => ${res}`);
            showNotification(`结果：${res}`, 'info');
        }

        function batchRun() {
            const n = getNumberValue();
            const decimals = Math.max(0, Math.min(8, Math.round(getDecimalsValue())));
            const times = Math.min(5000, Math.max(1, Math.round(getRepeatValue())));
            if (!Number.isFinite(n)) {
                showNotification('请输入合法数字', 'warning');
                return;
            }
            const t0 = performance.now();
            let res = 0;
            for (let i = 0; i < times; i++) {
                res = round(n, decimals);
            }
            const ms = performance.now() - t0;
            setChip('statusChip', '批量完成', 'ok');
            setChip('modeChip', '批量');
            setText('inputValue', n);
            setText('decimalsValue', decimals);
            setText('roundValue', res);
            setText('batchMs', `${ms.toFixed(2)} ms`);
            setText('nativeRound', calcNativeRound(n, decimals));
            setText('fixedRound', calcFixed(n, decimals));
            setText('customRound', res);
            addLog(`batch ${times} runs -> ${ms.toFixed(2)}ms`);
            showNotification(`批量完成：${times} 次`, 'success');
        }

        function showDetail() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            if (!state.last) {
                showNotification('请先执行一次', 'warning');
                return;
            }
            const expr = `Number(${Math.round(`${state.last.n}e${state.last.decimals}`)}e-${state.last.decimals})`;
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">详情</div>
                    <div style="margin-bottom:8px;">输入：<span style="font-family:JetBrains Mono, monospace;">${state.last.n}</span></div>
                    <div style="margin-bottom:8px;">decimals：<strong>${state.last.decimals}</strong></div>
                    <div style="margin-bottom:8px;">round：<strong>${state.last.res}</strong></div>
                    <div style="margin-bottom:8px;">Math.round：<strong>${state.last.native}</strong></div>
                    <div style="margin-bottom:8px;">toFixed：<strong>${state.last.fixed}</strong></div>
                    <div style="margin-top:12px; font-weight:900;">表达式</div>
                    <div style="margin-top:8px; padding:10px 12px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0; font-family:JetBrains Mono, monospace; white-space:pre; overflow:auto;">${expr}</div>
                </div>
            `;
            showModal(content);
        }

        function resetAll() {
            setInputValue(state.inputs.number, 'numberNative', 12.3456);
            setInputValue(state.inputs.decimals, 'decimalsNative', 2);
            setInputValue(state.inputs.repeat, 'repeatNative', 500);
            clearLog();
            setChip('statusChip', '等待执行', 'ok');
            setChip('modeChip', '单次');
            setText('inputValue', '-');
            setText('decimalsValue', 0);
            setText('roundValue', '-');
            setText('batchMs', '-');
            setText('nativeRound', '-');
            setText('fixedRound', '-');
            setText('customRound', '-');
            state.last = null;
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const applyExampleBtn = document.getElementById('applyExampleBtn');
            const runBtn = document.getElementById('runBtn');
            const batchBtn = document.getElementById('batchBtn');
            const detailBtn = document.getElementById('detailBtn');
            const resetBtn = document.getElementById('resetBtn');

            if (applyExampleBtn) applyExampleBtn.addEventListener('click', applyExample);
            if (runBtn) runBtn.addEventListener('click', run);
            if (batchBtn) batchBtn.addEventListener('click', batchRun);
            if (detailBtn) detailBtn.addEventListener('click', showDetail);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            applyExample();
            run();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
