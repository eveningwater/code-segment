<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sortCharactersInString 实战：字符排序工作台</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="../../demo/plugins/datetime-picker/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #eef2f7;
            color: #0f172a;
            padding: 28px 20px 48px;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .header {
            background: #fff;
            border-radius: 18px;
            padding: 22px 26px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }

        .header h1 {
            font-size: 1.65rem;
            font-weight: 800;
        }

        .header .sub {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.94rem;
            line-height: 1.65;
        }

        .grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 18px;
            align-items: start;
        }

        @media (max-width: 960px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 20px 22px;
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.07);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .card h2 {
            font-size: 1.08rem;
            font-weight: 800;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row label {
            font-size: 0.88rem;
            color: #475569;
            font-weight: 600;
        }

        .form-row small {
            color: #94a3b8;
            font-size: 0.78rem;
            line-height: 1.5;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 520px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }

        textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            font-size: 13px;
            line-height: 1.55;
            outline: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        textarea:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        textarea.out {
            background: #0f172a;
            color: #f1f5f9;
            min-height: 120px;
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .actions button {
            border: none;
            padding: 10px 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.88rem;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .actions button.primary {
            background: #7c3aed;
            color: #fff;
        }

        .actions button.secondary {
            background: #0d9488;
            color: #fff;
        }

        .actions button.ghost {
            background: #e2e8f0;
            color: #334155;
        }

        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 22px rgba(124, 58, 237, 0.2);
        }

        .hint {
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.65;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .stat {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .stat-k {
            font-size: 0.72rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 700;
        }

        .stat-v {
            font-weight: 800;
            font-size: 0.95rem;
            margin-top: 4px;
            word-break: break-all;
            font-family: ui-monospace, Menlo, monospace;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            background: #ede9fe;
            color: #5b21b6;
        }

        .chip.ok {
            background: #d1fae5;
            color: #065f46;
        }

        .chip.warn {
            background: #fef3c7;
            color: #92400e;
        }

        .freq {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 140px;
            overflow: auto;
            padding: 4px 0;
        }

        .freq span {
            font-size: 11px;
            font-family: ui-monospace, Menlo, monospace;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .panel .ew-select {
            width: 100%;
        }

        .panel .ew-select .select-header span,
        .panel .ew-select .select-option {
            color: #0f172a;
            font-weight: 600;
        }

        .grid > .panel {
            position: relative;
            z-index: 1;
        }

        .grid > .panel.is-elevated {
            z-index: 9000;
        }

        .ew-datetime-picker.open {
            z-index: 7000;
        }

        .ew-datetime-picker .datetime-panel {
            z-index: 9001;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <h1>sortCharactersInString 实战：字符排序工作台</h1>
            <p class="sub">
                核心 API 使用 <code>[...str].sort((a, b) => a.localeCompare(b)).join('')</code>；
                下方可切换区域设置、敏感度，并支持批量按行处理、异位词检测与导出快照。
            </p>
        </div>

        <div class="grid">
            <div class="card panel" id="configPanel">
                <h2>配置</h2>

                <div class="form-row">
                    <label>区域 / 语言（localeCompare）</label>
                    <div id="localeSelect"></div>
                </div>

                <div class="form-row">
                    <label>排序敏感度 sensitivity</label>
                    <div id="sensitivitySelect"></div>
                    <small>与「使用核心函数（忽略区域设置）」互斥时以勾选为准。</small>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>批量最大行数</label>
                        <div id="maxLinesInput"></div>
                    </div>
                    <div class="form-row">
                        <label>导出快照时间</label>
                        <div id="snapshotPicker"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button type="button" id="btnSort" class="primary">排序当前文本</button>
                    <button type="button" id="btnBatch" class="secondary">批量（每行）</button>
                    <button type="button" id="btnAnagram" class="secondary">异位词检测</button>
                    <button type="button" id="btnCopy" class="ghost">复制结果</button>
                    <button type="button" id="btnExport" class="ghost">导出 JSON</button>
                    <button type="button" id="btnApi" class="ghost">查看核心代码</button>
                </div>

                <div class="form-row">
                    <label>第二段文本（异位词对比用）</label>
                    <textarea id="inputB" placeholder="例如：listen 与 silent"></textarea>
                </div>

                <div class="hint">
                    勾选「使用核心函数」时仅执行文档中的 <code>sortCharactersInString</code>，不传入 locale 选项。
                </div>
            </div>

            <div class="card">
                <h2>输入 / 输出</h2>
                <div class="form-row">
                    <label>原文</label>
                    <textarea id="inputA" placeholder="例如：cabbage 或 混合中文ABC"></textarea>
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
                    <span id="chipMode" class="chip">模式：整段</span>
                    <span id="chipAnagram" class="chip warn">异位词：未检测</span>
                </div>
                <div class="form-row">
                    <label>排序结果</label>
                    <textarea id="output" class="out" readonly placeholder="点击「排序当前文本」或开启实时预览…"></textarea>
                </div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-k">原长度</div>
                        <div class="stat-v" id="stLen">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-k">结果长度</div>
                        <div class="stat-v" id="stOutLen">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-k">唯一字符数</div>
                        <div class="stat-v" id="stUnique">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-k">已排序？</div>
                        <div class="stat-v" id="stSorted">-</div>
                    </div>
                </div>
                <div class="form-row">
                    <label>字符频次（排序后序列压缩展示）</label>
                    <div id="freqBox" class="freq"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="../../demo/plugins/datetime-picker/index.js"></script>
    <script>
        const sortCharactersInString = str =>
            [...str].sort((a, b) => a.localeCompare(b)).join('');

        const sortCharactersWithOptions = (str, locale, sensitivity) => {
            const loc = locale === '' || locale === 'default' ? undefined : locale;
            const opts = sensitivity === 'default' ? undefined : { sensitivity };
            return [...str].sort((a, b) => a.localeCompare(b, loc, opts)).join('');
        };

        const state = {
            modal: null,
            notification: null,
            checkboxGroup: null,
            localeSelect: null,
            localeNative: null,
            sensSelect: null,
            sensNative: null,
            maxLinesInput: null,
            snapshotPicker: null,
            checkboxDefs: [],
            debounceTimer: null
        };

        function $(id) {
            return document.getElementById(id);
        }

        function notify(msg, type = 'info') {
            if (!getCb('showNotify')) return;
            if (state.notification) state.notification.show(msg, type);
            else console.log(`[${type}]`, msg);
        }

        function modal(html) {
            if (state.modal) state.modal.alert(html);
            else alert(html.replace(/<[^>]+>/g, ''));
        }

        function getCb(id) {
            if (state.checkboxGroup && typeof state.checkboxGroup.getAllChecked === 'function') {
                try {
                    const arr = state.checkboxGroup.getAllChecked();
                    const i = state.checkboxDefs.findIndex((d) => d.id === id);
                    if (i >= 0) return Boolean(arr[i]);
                } catch (e) {}
            }
            const el = $(id);
            return el ? el.checked : false;
        }

        function getLocale() {
            if (state.localeSelect && typeof state.localeSelect.getValue === 'function') {
                return state.localeSelect.getValue() || 'default';
            }
            return state.localeNative ? state.localeNative.value : 'default';
        }

        function getSensitivity() {
            if (state.sensSelect && typeof state.sensSelect.getValue === 'function') {
                return state.sensSelect.getValue() || 'default';
            }
            return state.sensNative ? state.sensNative.value : 'default';
        }

        function getMaxLines() {
            if (state.maxLinesInput && typeof state.maxLinesInput.getValue === 'function') {
                try {
                    return Math.max(1, Math.min(500, Number(state.maxLinesInput.getValue()) || 50));
                } catch (e) {}
            }
            const n = $('maxLinesNative');
            return n ? Math.max(1, Math.min(500, Number(n.value) || 50)) : 50;
        }

        function getSnapshotTime() {
            if (state.snapshotPicker && typeof state.snapshotPicker.getValue === 'function') {
                try {
                    return state.snapshotPicker.getValue() || '';
                } catch (e) {}
            }
            const el = $('snapshotNative');
            return el ? el.value : '';
        }

        function nowLocal() {
            const d = new Date();
            const off = d.getTimezoneOffset();
            const local = new Date(d.getTime() - off * 60 * 1000);
            return local.toISOString().slice(0, 16);
        }

        function sortForUi(str) {
            if (getCb('useCoreOnly')) return sortCharactersInString(str);
            return sortCharactersWithOptions(str, getLocale(), getSensitivity());
        }

        function charFreqRunLength(s) {
            if (!s) return [];
            const arr = [];
            let ch = s[0];
            let n = 1;
            for (let i = 1; i < s.length; i++) {
                if (s[i] === ch) n++;
                else {
                    arr.push({ ch, n });
                    ch = s[i];
                    n = 1;
                }
            }
            arr.push({ ch, n });
            return arr;
        }

        function uniqueCount(s) {
            return new Set([...s]).size;
        }

        function isSortedByCodepoints(s) {
            for (let i = 1; i < s.length; i++) {
                if (s[i - 1] > s[i]) return false;
            }
            return true;
        }

        function applyOutput(text, modeLabel) {
            $('output').value = text;
            $('chipMode').textContent = `模式：${modeLabel}`;
            const a = $('inputA').value;
            $('stLen').textContent = String([...a].length);
            $('stOutLen').textContent = String([...text].length);
            $('stUnique').textContent = String(uniqueCount(text));
            const sorted = isSortedByCodepoints(text);
            $('stSorted').textContent = sorted ? '是（码点非严谨）' : '否';
            const box = $('freqBox');
            box.innerHTML = '';
            charFreqRunLength(text).forEach(({ ch, n }) => {
                const span = document.createElement('span');
                const display = ch === '\n' ? '\\n' : ch === ' ' ? '␠' : ch;
                span.textContent = `${display}×${n}`;
                box.appendChild(span);
            });
        }

        function doSort() {
            let raw = $('inputA').value;
            if (getCb('trimInput')) raw = raw.trim();
            const out = sortForUi(raw);
            applyOutput(out, '整段');
            notify('已排序', 'success');
        }

        function doBatch() {
            const max = getMaxLines();
            let lines = $('inputA').value.split(/\r?\n/);
            if (getCb('skipEmpty')) lines = lines.filter((l) => l.trim() !== '');
            if (getCb('trimLines')) lines = lines.map((l) => l.trim());
            if (lines.length > max) {
                notify(`仅处理前 ${max} 行`, 'warning');
                lines = lines.slice(0, max);
            }
            const out = lines.map((line) => sortForUi(line)).join('\n');
            applyOutput(out, `批量 ${lines.length} 行`);
            notify('批量排序完成', 'success');
        }

        function normalizeForAnagram(s) {
            let t = s;
            if (getCb('trimInput')) t = t.trim();
            if (getCb('ignoreSpace')) t = t.replace(/\s+/g, '');
            return t;
        }

        function doAnagram() {
            const a = normalizeForAnagram($('inputA').value);
            const b = normalizeForAnagram($('inputB').value);
            if (!a || !b) {
                notify('请填写两段文本', 'warning');
                $('chipAnagram').textContent = '异位词：缺文本';
                $('chipAnagram').className = 'chip warn';
                return;
            }
            const sa = sortForUi(a);
            const sb = sortForUi(b);
            const ok = sa === sb;
            $('chipAnagram').textContent = ok ? '异位词：是（排序后相同）' : '异位词：否';
            $('chipAnagram').className = ok ? 'chip ok' : 'chip warn';
            notify(ok ? '两段为异位词' : '不是异位词', ok ? 'success' : 'info');
        }

        async function doCopy() {
            const t = $('output').value;
            if (!t) {
                notify('无内容可复制', 'warning');
                return;
            }
            try {
                await navigator.clipboard.writeText(t);
                notify('已复制', 'success');
            } catch (e) {
                notify('复制失败', 'error');
            }
        }

        function doExport() {
            const payload = {
                snapshotAt: getSnapshotTime() || nowLocal(),
                input: $('inputA').value,
                inputB: $('inputB').value,
                output: $('output').value,
                options: {
                    locale: getLocale(),
                    sensitivity: getSensitivity(),
                    useCoreOnly: getCb('useCoreOnly'),
                    trimInput: getCb('trimInput'),
                    trimLines: getCb('trimLines'),
                    skipEmpty: getCb('skipEmpty'),
                    ignoreSpace: getCb('ignoreSpace')
                }
            };
            const esc = String(JSON.stringify(payload, null, 2))
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            modal(`<div style="padding:14px 12px;color:#0f172a;">
                <div style="font-weight:900;margin-bottom:10px;">导出 JSON</div>
                <pre style="margin:0;max-height:380px;overflow:auto;padding:12px;border-radius:10px;border:1px solid #e2e8f0;background:#0f172a;color:#f8fafc;font-size:12px;"><code>${esc}</code></pre>
            </div>`);
            notify('已生成导出', 'info');
        }

        function doApiModal() {
            modal(`<div style="padding:14px 12px;color:#0f172a;font-size:14px;line-height:1.75;">
                <div style="font-weight:900;margin-bottom:10px;">sortCharactersInString（文档核心）</div>
                <pre style="background:#f8fafc;border:1px solid #e2e8f0;padding:12px;border-radius:10px;overflow:auto;">const sortCharactersInString = str =>
  [...str].sort((a, b) => a.localeCompare(b)).join('');</pre>
                <div style="margin-top:12px;font-weight:800;">扩展（本页配置区）</div>
                <pre style="margin-top:8px;background:#f8fafc;border:1px solid #e2e8f0;padding:12px;border-radius:10px;overflow:auto;font-size:12px;">const sortCharactersWithOptions = (str, locale, sensitivity) => {
  const loc = locale === '' || locale === 'default' ? undefined : locale;
  const opts = sensitivity === 'default' ? undefined : { sensitivity };
  return [...str].sort((a, b) => a.localeCompare(b, loc, opts)).join('');
};</pre>
            </div>`);
        }

        function maybeLivePreview() {
            if (!getCb('livePreview')) return;
            clearTimeout(state.debounceTimer);
            state.debounceTimer = setTimeout(() => {
                try {
                    let raw = $('inputA').value;
                    if (getCb('trimInput')) raw = raw.trim();
                    applyOutput(sortForUi(raw), '实时');
                } catch (e) {}
            }, 200);
        }

        function initPlugins() {
            try {
                state.modal = new Modal();
            } catch (e) {}
            try {
                state.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function setupSelects() {
            const locales = [
                { value: 'default', label: '默认（浏览器）' },
                { value: 'zh-CN', label: 'zh-CN' },
                { value: 'en-US', label: 'en-US' },
                { value: 'ja-JP', label: 'ja-JP' }
            ];
            const sens = [
                { value: 'default', label: '默认' },
                { value: 'variant', label: 'variant' },
                { value: 'case', label: 'case' },
                { value: 'accent', label: 'accent' },
                { value: 'base', label: 'base' }
            ];

            const lEl = $('localeSelect');
            if (lEl) {
                try {
                    state.localeSelect = new Select({ container: lEl, options: locales, onChange: () => maybeLivePreview() });
                    state.localeSelect.setValue('default');
                } catch (e) {
                    const sel = document.createElement('select');
                    locales.forEach((o) => {
                        const opt = document.createElement('option');
                        opt.value = o.value;
                        opt.textContent = o.label;
                        sel.appendChild(opt);
                    });
                    sel.addEventListener('change', maybeLivePreview);
                    lEl.appendChild(sel);
                    state.localeNative = sel;
                }
            }

            const sEl = $('sensitivitySelect');
            if (sEl) {
                try {
                    state.sensSelect = new Select({ container: sEl, options: sens, onChange: () => maybeLivePreview() });
                    state.sensSelect.setValue('default');
                } catch (e) {
                    const sel = document.createElement('select');
                    sens.forEach((o) => {
                        const opt = document.createElement('option');
                        opt.value = o.value;
                        opt.textContent = o.label;
                        sel.appendChild(opt);
                    });
                    sel.addEventListener('change', maybeLivePreview);
                    sEl.appendChild(sel);
                    state.sensNative = sel;
                }
            }
        }

        function setupInputNumber() {
            const wrap = $('maxLinesInput');
            if (!wrap) return;
            try {
                state.maxLinesInput = new InputNumber({
                    container: wrap,
                    min: 1,
                    max: 500,
                    step: 1,
                    value: 50,
                    onChange: () => {}
                });
            } catch (e) {
                const input = document.createElement('input');
                input.type = 'number';
                input.id = 'maxLinesNative';
                input.min = '1';
                input.max = '500';
                input.value = '50';
                wrap.appendChild(input);
            }
        }

        function setupPicker() {
            const wrap = $('snapshotPicker');
            if (!wrap) return;
            try {
                state.snapshotPicker = new DateTimePicker({
                    container: '#snapshotPicker',
                    value: nowLocal(),
                    placeholder: '快照时间',
                    onChange: () => {}
                });
            } catch (e) {
                const input = document.createElement('input');
                input.type = 'datetime-local';
                input.id = 'snapshotNative';
                input.value = nowLocal();
                wrap.appendChild(input);
            }

            const pickerEl = wrap.querySelector('.ew-datetime-picker');
            const panelEl = $('configPanel');
            if (pickerEl && panelEl) {
                const sync = () => {
                    if (pickerEl.classList.contains('open')) panelEl.classList.add('is-elevated');
                    else panelEl.classList.remove('is-elevated');
                };
                sync();
                new MutationObserver(sync).observe(pickerEl, { attributes: true, attributeFilter: ['class'] });
            }
        }

        function setupCheckboxes() {
            const container = $('optionCheckbox');
            if (!container) return;
            const items = [
                { id: 'useCoreOnly', label: '仅使用核心 sortCharactersInString', checked: false },
                { id: 'trimInput', label: '整段排序前 trim', checked: false },
                { id: 'trimLines', label: '批量时每行 trim', checked: true },
                { id: 'skipEmpty', label: '批量时跳过空行', checked: true },
                { id: 'ignoreSpace', label: '异位词对比忽略空白', checked: true },
                { id: 'livePreview', label: '输入时实时预览（防抖）', checked: true },
                { id: 'showNotify', label: '显示通知', checked: true }
            ];
            state.checkboxDefs = items;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: items.map((x) => ({ id: x.id, label: x.label, checked: x.checked })),
                    onChange: () => maybeLivePreview()
                });
                container.appendChild(group.container);
                state.checkboxGroup = group;
            } catch (e) {
                items.forEach((x) => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '6px';
                    div.innerHTML = `<input type="checkbox" id="${x.id}" ${x.checked ? 'checked' : ''}/><label for="${x.id}" style="margin-left:8px;cursor:pointer;">${x.label}</label>`;
                    div.querySelector('input').addEventListener('change', maybeLivePreview);
                    container.appendChild(div);
                });
            }
        }

        function bind() {
            $('btnSort').addEventListener('click', doSort);
            $('btnBatch').addEventListener('click', doBatch);
            $('btnAnagram').addEventListener('click', doAnagram);
            $('btnCopy').addEventListener('click', doCopy);
            $('btnExport').addEventListener('click', doExport);
            $('btnApi').addEventListener('click', doApiModal);
            $('inputA').addEventListener('input', maybeLivePreview);
        }

        function init() {
            initPlugins();
            setupSelects();
            setupInputNumber();
            setupPicker();
            setupCheckboxes();
            bind();
            $('inputA').value = 'cabbage';
            maybeLivePreview();
            notify('字符排序工作台已就绪', 'info');
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>

</html>
