<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shank</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }

        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
        }

        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 18px;
            align-items: start;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
        }

        .card h2 {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 108px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row label {
            font-size: 13px;
            color: #334155;
            font-weight: 800;
        }

        .text-input {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            outline: none;
            background: #ffffff;
            transition: border-color 0.12s ease, box-shadow 0.12s ease;
        }

        .text-input:focus {
            border-color: rgba(37, 99, 235, 0.65);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.12s ease;
        }

        button:active {
            transform: translateY(1px);
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #0f172a;
            color: #fff;
        }

        .ghost {
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }

        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }

        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }

        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }

        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }

        .result {
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            min-height: 280px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>shank 自定义插件演示</h1>
            </div>
            <div class="subtitle">shank(arr, index, delCount, ...elements) 类似 splice，但返回一个新数组，不修改原数组。</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>数组模板</label>
                    <div id="presetSelect"></div>
                </div>

                <div class="form-row">
                    <label>原数组</label>
                    <input id="arrayInput" class="text-input" value="1,2,3,4,5" />
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>index</label>
                        <div id="indexInput"></div>
                    </div>
                    <div class="form-row">
                        <label>delCount</label>
                        <div id="delInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>插入元素</label>
                    <input id="elementsInput" class="text-input" value="99,100" />
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="applyBtn" class="secondary">执行 shank</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">提示：可将“插入元素”留空（表示不插入），也可把数组/元素改成字符串（关闭“解析为数字”）。</div>
            </div>

            <div class="card">
                <h2>结果</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Result</div>
                            <div class="stage-sub">观察是否修改原数组，以及输出数组内容</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">就绪</span>
                            <span id="opChip" class="chip">op: -</span>
                        </div>
                    </div>

                    <div id="resultBox" class="result"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const shank = (arr, index = 0, delCount = 0, ...elements) =>
            arr
                .slice(0, index)
                .concat(elements)
                .concat(arr.slice(index + delCount));

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                preset: null,
                presetNative: null
            },
            inputs: {
                index: null,
                indexNative: null,
                del: null,
                delNative: null
            },
            checkboxOptions: [],
            last: { arr: [], out: [], op: '-' }
        };

        const presets = {
            nums: { label: '数字数组：1..8', arr: [1, 2, 3, 4, 5, 6, 7, 8], index: 3, del: 2, elements: [99, 100] },
            words: { label: '字符串数组：a,b,c,d', arr: ['a', 'b', 'c', 'd'], index: 1, del: 0, elements: ['X'] },
            mix: { label: '混合：1,2,x,y', arr: [1, 2, 'x', 'y'], index: 2, del: 1, elements: ['Z', 'K'] },
            emptyInsert: { label: '只删除不插入', arr: [10, 20, 30, 40], index: 1, del: 2, elements: [] }
        };

        const presetOptions = Object.entries(presets).map(([value, item]) => ({ value, label: item.label }));

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(String(content).replace(/<[^>]*>/g, ''));
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = String(text);
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = String(text);
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoRun', label: '配置变化自动执行', checked: true },
                { id: 'parseNumber', label: '解析为数字', checked: true },
                { id: 'clampIndex', label: 'index 越界裁剪', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const container = document.getElementById('presetSelect');
            if (!container) return;
            try {
                state.selects.preset = new Select({
                    container,
                    options: presetOptions,
                    placeholder: '选择模板',
                    onChange: () => {
                        applyPreset();
                    }
                });
                state.selects.preset.setValue('nums');
            } catch (e) {
                const select = document.createElement('select');
                select.className = 'text-input';
                presetOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'nums';
                select.addEventListener('change', applyPreset);
                container.appendChild(select);
                state.selects.presetNative = select;
            }
        }

        function getPresetKey() {
            if (state.selects.preset && typeof state.selects.preset.getValue === 'function') {
                return state.selects.preset.getValue() || 'nums';
            }
            return state.selects.presetNative ? state.selects.presetNative.value : 'nums';
        }

        function setupInputs() {
            const indexContainer = document.getElementById('indexInput');
            const delContainer = document.getElementById('delInput');

            if (indexContainer) {
                try {
                    state.inputs.index = new InputNumber({
                        container: indexContainer,
                        min: -999,
                        max: 999,
                        step: 1,
                        value: 3,
                        onChange: () => {
                            if (getCheckboxValue('autoRun')) run();
                        }
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '-999';
                    input.max = '999';
                    input.step = '1';
                    input.value = '3';
                    input.className = 'text-input';
                    input.id = 'indexNative';
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoRun')) run();
                    });
                    indexContainer.appendChild(input);
                    state.inputs.indexNative = input;
                }
            }

            if (delContainer) {
                try {
                    state.inputs.del = new InputNumber({
                        container: delContainer,
                        min: 0,
                        max: 999,
                        step: 1,
                        value: 2,
                        onChange: () => {
                            if (getCheckboxValue('autoRun')) run();
                        }
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '999';
                    input.step = '1';
                    input.value = '2';
                    input.className = 'text-input';
                    input.id = 'delNative';
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoRun')) run();
                    });
                    delContainer.appendChild(input);
                    state.inputs.delNative = input;
                }
            }
        }

        function getNumber(plugin, nativeEl, fallback) {
            if (plugin && typeof plugin.getValue === 'function') {
                try {
                    const n = Number(plugin.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            if (nativeEl) {
                const n = Number(nativeEl.value);
                if (Number.isFinite(n)) return n;
            }
            return fallback;
        }

        function setInputValue(plugin, nativeEl, value) {
            if (plugin && typeof plugin.setValue === 'function') {
                try {
                    plugin.setValue(value);
                    return;
                } catch (e) {}
            }
            if (nativeEl) nativeEl.value = String(value);
        }

        function parseList(raw, asNumber) {
            const s = String(raw ?? '').trim();
            if (!s) return [];
            const parts = s.split(',').map(x => x.trim()).filter(Boolean);
            if (!asNumber) return parts;
            return parts.map(p => {
                const n = Number(p);
                return Number.isFinite(n) ? n : p;
            });
        }

        function clamp(n, min, max) {
            return Math.min(max, Math.max(min, n));
        }

        function getInputs() {
            const arrRaw = document.getElementById('arrayInput')?.value ?? '';
            const elRaw = document.getElementById('elementsInput')?.value ?? '';
            const asNumber = getCheckboxValue('parseNumber');
            const arr = parseList(arrRaw, asNumber);
            const elements = parseList(elRaw, asNumber);
            let index = Math.round(getNumber(state.inputs.index, state.inputs.indexNative, 0));
            let delCount = Math.max(0, Math.round(getNumber(state.inputs.del, state.inputs.delNative, 0)));

            if (getCheckboxValue('clampIndex')) {
                index = clamp(index, 0, arr.length);
            }

            return { arr, index, delCount, elements };
        }

        function formatVal(v) {
            if (typeof v === 'string') return `"${v}"`;
            if (v === undefined) return 'undefined';
            if (v === null) return 'null';
            try {
                return JSON.stringify(v);
            } catch (e) {
                return String(v);
            }
        }

        function render() {
            const box = document.getElementById('resultBox');
            if (!box) return;
            const { arr, out, op } = state.last;
            const sameRef = arr === out;
            const lines = [];
            lines.push(`op: ${op}`);
            lines.push('');
            lines.push(`输入数组: [${arr.map(formatVal).join(', ')}]`);
            lines.push(`输出数组: [${out.map(formatVal).join(', ')}]`);
            lines.push('');
            lines.push(`原数组是否被修改: ${sameRef ? '未知（同引用）' : '未修改（返回新数组）'}`);
            lines.push('');
            lines.push(`提示: shank 使用 slice/concat 组合新数组，不会改动原数组引用。`);
            box.textContent = lines.join('\n');
            setChip('opChip', `op: ${op}`);
        }

        function run() {
            const { arr, index, delCount, elements } = getInputs();
            const before = arr.slice();
            const op = `shank(arr, ${index}, ${delCount}, ${elements.map(formatVal).join(', ')})`;
            try {
                const out = shank(arr, index, delCount, ...elements);
                state.last = { arr: before, out, op };
                setChip('statusChip', '完成', 'ok');
                render();
                showNotification('已执行', 'success');
            } catch (e) {
                const msg = String(e && e.message ? e.message : e);
                setChip('statusChip', '失败', 'warn');
                showNotification('执行失败', 'error');
                showModal(`<div style="padding:12px 8px; font-size:14px; color:#1f2937;"><div style="font-weight:900; margin-bottom:10px;">执行失败</div><pre style="margin:0; padding:12px; border-radius:12px; background:#0b1220; color:#e2e8f0; overflow:auto; line-height:1.55; font-size:12px;">${escapeHtml(msg)}</pre></div>`);
            }
        }

        function showCode() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(shank.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">shank</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="shank" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="shank"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function applyPreset() {
            const key = getPresetKey();
            const preset = presets[key] || presets.nums;
            const arrayInput = document.getElementById('arrayInput');
            const elementsInput = document.getElementById('elementsInput');
            if (arrayInput) arrayInput.value = preset.arr.join(',');
            if (elementsInput) elementsInput.value = preset.elements.join(',');
            setInputValue(state.inputs.index, state.inputs.indexNative, preset.index);
            setInputValue(state.inputs.del, state.inputs.delNative, preset.del);
            showNotification('已应用模板', 'info');
            if (getCheckboxValue('autoRun')) run();
        }

        function resetAll() {
            if (state.selects.preset && typeof state.selects.preset.setValue === 'function') {
                try {
                    state.selects.preset.setValue('nums');
                } catch (e) {}
            }
            if (state.selects.presetNative) state.selects.presetNative.value = 'nums';
            applyPreset();
            setChip('statusChip', '就绪', 'ok');
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const applyBtn = document.getElementById('applyBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const arrayInput = document.getElementById('arrayInput');
            const elementsInput = document.getElementById('elementsInput');

            if (applyBtn) applyBtn.addEventListener('click', run);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);

            if (arrayInput) arrayInput.addEventListener('input', () => {
                if (getCheckboxValue('autoRun')) run();
            });
            if (elementsInput) elementsInput.addEventListener('input', () => {
                if (getCheckboxValue('autoRun')) run();
            });
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            applyPreset();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
