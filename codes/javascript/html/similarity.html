<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>similarity</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }

        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 13px;
            color: #475569;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: 440px 1fr;
            gap: 18px;
            align-items: start;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
        }

        .card h2 {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 108px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row label {
            font-size: 13px;
            color: #334155;
            font-weight: 800;
        }

        .text-input {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            outline: none;
            background: #ffffff;
            transition: border-color 0.12s ease, box-shadow 0.12s ease;
        }

        .text-input:focus {
            border-color: rgba(37, 99, 235, 0.65);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.12s ease;
        }

        button:active {
            transform: translateY(1px);
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #0f172a;
            color: #fff;
        }

        .ghost {
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .chip-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }

        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }

        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }

        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }

        .result {
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            min-height: 260px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .hint {
            font-size: 12px;
            color: #64748b;
            line-height: 1.6;
            margin-top: 10px;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>similarity 自定义插件演示</h1>
            </div>
            <div class="subtitle">求两个数组的交集：<code>arr.filter(v =&gt; values.includes(v))</code>。支持模板、随机生成、类型解析与代码高亮。</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>模板</label>
                    <div id="presetSelect"></div>
                </div>

                <div class="form-row">
                    <label>数组 A</label>
                    <input id="arrInput" class="text-input" value="1,2,3,4,5" />
                </div>

                <div class="form-row">
                    <label>数组 B</label>
                    <input id="valuesInput" class="text-input" value="3,4,9" />
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>随机长度</label>
                        <div id="lenInput"></div>
                    </div>
                    <div class="form-row">
                        <label>值范围</label>
                        <div id="rangeInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="calcBtn" class="primary">计算交集</button>
                    <button id="randomBtn" class="secondary">生成随机</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">提示：开启“解析为数字”时，会把每个逗号分隔项转为 number（无法转换的仍保留为 string）。</div>
            </div>

            <div class="card">
                <h2>结果</h2>
                <div class="stage">
                    <div class="chip-row">
                        <span id="statusChip" class="chip ok">就绪</span>
                        <span id="aChip" class="chip">A: -</span>
                        <span id="bChip" class="chip">B: -</span>
                        <span id="rChip" class="chip">R: -</span>
                    </div>
                    <pre id="resultBox" class="result"></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const similarity = (arr, values) => arr.filter(v => values.includes(v));

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                preset: null,
                presetNative: null
            },
            inputs: {
                len: null,
                lenNative: null,
                range: null,
                rangeNative: null
            },
            optionDefs: [],
            last: { a: [], b: [], r: [] }
        };

        const presets = {
            nums: { label: '数字：A=1..8, B=3,4,9', a: '1,2,3,4,5,6,7,8', b: '3,4,9' },
            words: { label: '字符串：颜色交集', a: 'red,green,blue,black', b: 'white,black,blue' },
            mix: { label: '混合：数字+字符串', a: '1,2,x,y,3', b: '3,y,9' },
            dup: { label: '重复值：A 有重复', a: '1,2,2,3,3,3,4', b: '2,3,5' }
        };

        const presetOptions = Object.entries(presets).map(([value, item]) => ({ value, label: item.label }));

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getOption('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(String(content).replace(/<[^>]*>/g, ''));
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = String(text);
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setupSelects() {
            const container = document.getElementById('presetSelect');
            if (!container) return;
            try {
                state.selects.preset = new Select({
                    container,
                    options: presetOptions,
                    placeholder: '选择模板',
                    onChange: () => {
                        applyPreset();
                        if (getOption('autoRun')) calc();
                    }
                });
                state.selects.preset.setValue('nums');
            } catch (e) {
                const select = document.createElement('select');
                select.className = 'text-input';
                presetOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'nums';
                select.addEventListener('change', () => {
                    applyPreset();
                    if (getOption('autoRun')) calc();
                });
                container.appendChild(select);
                state.selects.presetNative = select;
            }
        }

        function getPresetKey() {
            if (state.selects.preset && typeof state.selects.preset.getValue === 'function') {
                try {
                    return state.selects.preset.getValue() || 'nums';
                } catch (e) {}
            }
            return state.selects.presetNative ? state.selects.presetNative.value : 'nums';
        }

        function setupInputs() {
            const lenContainer = document.getElementById('lenInput');
            const rangeContainer = document.getElementById('rangeInput');

            if (lenContainer) {
                try {
                    state.inputs.len = new InputNumber({
                        container: lenContainer,
                        min: 1,
                        max: 30,
                        step: 1,
                        value: 10,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '1';
                    input.max = '30';
                    input.step = '1';
                    input.value = '10';
                    input.className = 'text-input';
                    input.id = 'lenNative';
                    lenContainer.appendChild(input);
                    state.inputs.lenNative = input;
                }
            }

            if (rangeContainer) {
                try {
                    state.inputs.range = new InputNumber({
                        container: rangeContainer,
                        min: 2,
                        max: 200,
                        step: 1,
                        value: 12,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '2';
                    input.max = '200';
                    input.step = '1';
                    input.value = '12';
                    input.className = 'text-input';
                    input.id = 'rangeNative';
                    rangeContainer.appendChild(input);
                    state.inputs.rangeNative = input;
                }
            }
        }

        function getNumber(plugin, nativeEl, fallback) {
            if (plugin && typeof plugin.getValue === 'function') {
                try {
                    const n = Number(plugin.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            if (nativeEl) {
                const n = Number(nativeEl.value);
                if (Number.isFinite(n)) return n;
            }
            return fallback;
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoRun', label: '输入变化自动计算', checked: true },
                { id: 'parseNumber', label: '解析为数字', checked: true },
                { id: 'unique', label: '结果去重', checked: false },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.optionDefs = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getOption(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.optionDefs.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function parseList(raw, asNumber) {
            const s = String(raw ?? '').trim();
            if (!s) return [];
            const parts = s.split(',').map(x => x.trim()).filter(Boolean);
            if (!asNumber) return parts;
            return parts.map(p => {
                const n = Number(p);
                return Number.isFinite(n) ? n : p;
            });
        }

        function formatVal(v) {
            if (typeof v === 'string') return `"${v}"`;
            if (v === undefined) return 'undefined';
            if (v === null) return 'null';
            try {
                return JSON.stringify(v);
            } catch (e) {
                return String(v);
            }
        }

        function render() {
            const box = document.getElementById('resultBox');
            if (!box) return;
            const { a, b, r } = state.last;
            const lines = [];
            lines.push(`A(${a.length}): [${a.map(formatVal).join(', ')}]`);
            lines.push(`B(${b.length}): [${b.map(formatVal).join(', ')}]`);
            lines.push('');
            lines.push(`similarity(A, B) => R(${r.length})`);
            lines.push(`[${r.map(formatVal).join(', ')}]`);
            box.textContent = lines.join('\n');
            setChip('aChip', `A: ${a.length}`);
            setChip('bChip', `B: ${b.length}`);
            setChip('rChip', `R: ${r.length}`, r.length ? ' ok' : ' warn');
        }

        function calc() {
            const aRaw = document.getElementById('arrInput')?.value ?? '';
            const bRaw = document.getElementById('valuesInput')?.value ?? '';
            const asNumber = getOption('parseNumber');
            const a = parseList(aRaw, asNumber);
            const b = parseList(bRaw, asNumber);
            const r0 = similarity(a, b);
            const r = getOption('unique') ? Array.from(new Set(r0.map(v => typeof v === 'object' ? JSON.stringify(v) : String(v)))).map(s => {
                if (!asNumber) return s;
                const n = Number(s);
                return Number.isFinite(n) ? n : s;
            }) : r0;

            state.last = { a, b, r };
            setChip('statusChip', '完成', 'ok');
            render();
            showNotification('已计算交集', 'success');
        }

        function applyPreset() {
            const key = getPresetKey();
            const preset = presets[key] || presets.nums;
            const aEl = document.getElementById('arrInput');
            const bEl = document.getElementById('valuesInput');
            if (aEl) aEl.value = preset.a;
            if (bEl) bEl.value = preset.b;
            showNotification('已应用模板', 'info');
        }

        function randomInt(maxExclusive) {
            return Math.floor(Math.random() * Math.max(1, maxExclusive));
        }

        function generateRandom() {
            const len = Math.max(1, Math.min(30, Math.round(getNumber(state.inputs.len, state.inputs.lenNative, 10))));
            const range = Math.max(2, Math.min(200, Math.round(getNumber(state.inputs.range, state.inputs.rangeNative, 12))));

            const a = Array.from({ length: len }, () => randomInt(range));
            const b = Array.from({ length: len }, () => randomInt(range));

            const aEl = document.getElementById('arrInput');
            const bEl = document.getElementById('valuesInput');
            if (aEl) aEl.value = a.join(',');
            if (bEl) bEl.value = b.join(',');

            showNotification('已生成随机数组', 'success');
            if (getOption('autoRun')) calc();
        }

        function showCode() {
            if (!getOption('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(similarity.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">similarity</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="similarity" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="similarity"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function resetAll() {
            if (state.selects.preset && typeof state.selects.preset.setValue === 'function') {
                try {
                    state.selects.preset.setValue('nums');
                } catch (e) {}
            }
            if (state.selects.presetNative) state.selects.presetNative.value = 'nums';
            applyPreset();
            state.last = { a: [], b: [], r: [] };
            setChip('statusChip', '就绪', 'ok');
            render();
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const calcBtn = document.getElementById('calcBtn');
            const randomBtn = document.getElementById('randomBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const aEl = document.getElementById('arrInput');
            const bEl = document.getElementById('valuesInput');

            if (calcBtn) calcBtn.addEventListener('click', calc);
            if (randomBtn) randomBtn.addEventListener('click', generateRandom);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
            if (aEl) aEl.addEventListener('input', () => {
                if (getOption('autoRun')) calc();
            });
            if (bEl) bEl.addEventListener('input', () => {
                if (getOption('autoRun')) calc();
            });
        }

        function init() {
            initPlugins();
            setupSelects();
            setupInputs();
            setupCheckboxes();
            bindEvents();
            resetAll();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
