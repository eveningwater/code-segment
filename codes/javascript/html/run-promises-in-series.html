<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }
        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .task {
            border-radius: 14px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: start;
        }
        .task-name {
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .task-meta {
            color: #64748b;
            font-size: 12px;
            line-height: 1.55;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(100, 116, 139, 0.14);
            color: #334155;
            white-space: nowrap;
        }
        .tag.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .tag.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .tag.err {
            background: rgba(239, 68, 68, 0.16);
            color: #7f1d1d;
        }
        .log {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 220px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>runPromisesInSeries 自定义插件演示</h1>
            </div>
            <div class="subtitle">参照 run-async：用插件驱动“串行执行 Promise 队列”，并用 highlight.js 展示代码</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>任务方案</label>
                    <div id="planSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>任务数量</label>
                        <div id="countInput"></div>
                    </div>
                    <div class="form-row">
                        <label>基础延迟 (ms)</label>
                        <div id="delayInput"></div>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>失败概率 (%)</label>
                        <div id="failRateInput"></div>
                    </div>
                    <div class="form-row">
                        <label>随机种子</label>
                        <div id="seedInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="buildBtn" class="ghost">生成任务</button>
                    <button id="runBtn" class="secondary">串行执行</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">
                    提示：runPromisesInSeries 接收的是函数数组（每个函数返回 Promise）。串行执行会在前一个完成后再执行下一个。
                </div>
            </div>

            <div class="card">
                <h2>执行状态</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Series</div>
                            <div class="stage-sub">观察逐个任务的状态变化（pending / running / ok / error / ignored）</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">空闲</span>
                            <span id="runChip" class="chip">runId 0</span>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">总任务数</div>
                            <div class="stat-value" id="totalValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">完成数</div>
                            <div class="stat-value" id="doneValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">失败数</div>
                            <div class="stat-value" id="errorValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">最近结果</div>
                            <div class="stat-value" id="lastValue">-</div>
                        </div>
                    </div>

                    <div id="taskList" class="list"></div>

                    <div class="form-row">
                        <label>日志</label>
                        <div id="logBox" class="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const runPromisesInSeries = ps =>
            ps.reduce((p, next) => p.then(next), Promise.resolve());

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                plan: null,
                planNative: null
            },
            inputs: {
                count: null,
                delay: null,
                failRate: null,
                seed: null
            },
            checkboxOptions: [],
            runId: 0,
            tasks: [],
            counters: { done: 0, error: 0 },
            last: null
        };

        const plans = {
            api: { label: '模拟 API：随机延迟 + 可能失败' },
            transform: { label: '串行转换：逐步累加' },
            mix: { label: '混合：API + 转换 + 固定延迟' }
        };
        const planOptions = Object.entries(plans).map(([value, item]) => ({ value, label: item.label }));

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoBuild', label: '配置变化自动生成任务', checked: true },
                { id: 'ignoreOldResults', label: '忽略旧执行结果（runId）', checked: true },
                { id: 'stopOnError', label: '遇到错误立即停止', checked: true },
                { id: 'autoScrollLog', label: '日志自动滚动', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const container = document.getElementById('planSelect');
            if (!container) return;
            try {
                state.selects.plan = new Select({
                    container,
                    options: planOptions,
                    placeholder: '选择任务方案',
                    onChange: () => {
                        if (getCheckboxValue('autoBuild')) buildTasks();
                    }
                });
                state.selects.plan.setValue('api');
            } catch (e) {
                const select = document.createElement('select');
                select.className = 'input-field';
                planOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'api';
                select.addEventListener('change', () => {
                    if (getCheckboxValue('autoBuild')) buildTasks();
                });
                container.appendChild(select);
                state.selects.planNative = select;
            }
        }

        function getPlanKey() {
            if (state.selects.plan && typeof state.selects.plan.getValue === 'function') {
                return state.selects.plan.getValue() || 'api';
            }
            return state.selects.planNative ? state.selects.planNative.value : 'api';
        }

        function setupInputs() {
            const countContainer = document.getElementById('countInput');
            const delayContainer = document.getElementById('delayInput');
            const failRateContainer = document.getElementById('failRateInput');
            const seedContainer = document.getElementById('seedInput');

            if (countContainer) {
                try {
                    state.inputs.count = new InputNumber({
                        container: countContainer,
                        min: 1,
                        max: 30,
                        step: 1,
                        value: 8,
                        onChange: () => {
                            if (getCheckboxValue('autoBuild')) buildTasks();
                        }
                    });
                } catch (e) {}
            }
            if (delayContainer) {
                try {
                    state.inputs.delay = new InputNumber({
                        container: delayContainer,
                        min: 0,
                        max: 3000,
                        step: 50,
                        value: 500,
                        onChange: () => {
                            if (getCheckboxValue('autoBuild')) buildTasks();
                        }
                    });
                } catch (e) {}
            }
            if (failRateContainer) {
                try {
                    state.inputs.failRate = new InputNumber({
                        container: failRateContainer,
                        min: 0,
                        max: 100,
                        step: 1,
                        value: 15,
                        onChange: () => {
                            if (getCheckboxValue('autoBuild')) buildTasks();
                        }
                    });
                } catch (e) {}
            }
            if (seedContainer) {
                try {
                    state.inputs.seed = new InputNumber({
                        container: seedContainer,
                        min: 1,
                        max: 999999,
                        step: 1,
                        value: 42,
                        onChange: () => {
                            if (getCheckboxValue('autoBuild')) buildTasks();
                        }
                    });
                } catch (e) {}
            }
        }

        function getNumberFromInput(plugin, fallback, defaultValue) {
            if (plugin && typeof plugin.getValue === 'function') {
                try {
                    const n = Number(plugin.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            return defaultValue ?? fallback;
        }

        function getCount() {
            return Math.min(30, Math.max(1, Math.round(getNumberFromInput(state.inputs.count, 8, 8))));
        }

        function getDelayBase() {
            return Math.max(0, Math.round(getNumberFromInput(state.inputs.delay, 500, 500)));
        }

        function getFailRate() {
            return Math.min(100, Math.max(0, Math.round(getNumberFromInput(state.inputs.failRate, 15, 15))));
        }

        function getSeed() {
            return Math.min(999999, Math.max(1, Math.round(getNumberFromInput(state.inputs.seed, 42, 42))));
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = String(text);
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            if (getCheckboxValue('autoScrollLog')) box.scrollTop = box.scrollHeight;
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function mulberry32(seed) {
            let t = seed >>> 0;
            return function () {
                t += 0x6d2b79f5;
                let x = Math.imul(t ^ (t >>> 15), 1 | t);
                x ^= x + Math.imul(x ^ (x >>> 7), 61 | x);
                return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
            };
        }

        function delay(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        function buildTasks() {
            const plan = getPlanKey();
            const count = getCount();
            const baseDelay = getDelayBase();
            const failRate = getFailRate();
            const seed = getSeed();
            const rnd = mulberry32(seed);

            const tasks = [];
            let carry = 0;
            for (let i = 0; i < count; i++) {
                const jitter = Math.round(baseDelay * (0.4 + rnd() * 1.2));
                const shouldFail = rnd() < failRate / 100;
                const index = i;
                const fn = () => {
                    return delay(jitter).then(() => {
                        if (plan === 'transform') {
                            carry += 1 + (index % 3);
                            return { index, type: 'transform', carry };
                        }
                        if (plan === 'mix') {
                            if (index % 3 === 0) {
                                carry += 2;
                                return { index, type: 'transform', carry };
                            }
                            if (index % 3 === 1) {
                                if (shouldFail) throw new Error(`API#${index} failed`);
                                return { index, type: 'api', payload: { ok: true, id: index } };
                            }
                            return { index, type: 'delay', ms: jitter };
                        }
                        if (shouldFail) throw new Error(`API#${index} failed`);
                        return { index, type: 'api', payload: { ok: true, id: index } };
                    });
                };
                tasks.push({
                    id: `task_${i + 1}`,
                    name: `${plan} #${i + 1}`,
                    delay: jitter,
                    shouldFail,
                    status: 'pending',
                    fn
                });
            }

            state.tasks = tasks;
            state.counters.done = 0;
            state.counters.error = 0;
            state.last = null;

            renderTasks();
            updateStats();
            clearLog();
            setChip('statusChip', '已生成任务', 'ok');
            showNotification('已生成任务', 'info');
        }

        function updateStats() {
            setText('totalValue', state.tasks.length);
            setText('doneValue', state.counters.done);
            setText('errorValue', state.counters.error);
            setText('lastValue', state.last === null || state.last === undefined ? '-' : state.last);
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            if (!list) return;
            list.innerHTML = '';
            state.tasks.forEach((task, idx) => {
                const el = document.createElement('div');
                el.className = 'task';
                const tagClass =
                    task.status === 'ok' ? 'ok' :
                        task.status === 'error' ? 'err' :
                            task.status === 'running' ? 'warn' :
                                task.status === 'ignored' ? '' : '';
                el.innerHTML = `
                    <div>
                        <div class="task-name">${task.name}</div>
                        <div class="task-meta">#${idx + 1}  delay=${task.delay}ms  willFail=${task.shouldFail}</div>
                    </div>
                    <div class="tag ${tagClass}">${task.status}</div>
                `;
                list.appendChild(el);
            });
        }

        function markTask(index, status) {
            const task = state.tasks[index];
            if (!task) return;
            task.status = status;
            renderTasks();
        }

        async function runSeries() {
            if (!state.tasks.length) buildTasks();
            if (!state.tasks.length) return;

            state.runId += 1;
            const runId = state.runId;
            setText('runChip', `runId ${runId}`);
            setChip('statusChip', '执行中', 'warn');
            state.counters.done = 0;
            state.counters.error = 0;
            state.last = null;
            updateStats();
            clearLog();

            state.tasks.forEach(t => t.status = 'pending');
            renderTasks();

            const stopOnError = getCheckboxValue('stopOnError');
            const ignoreOld = getCheckboxValue('ignoreOldResults');

            const fns = state.tasks.map((task, index) => {
                return () => {
                    if (ignoreOld && runId !== state.runId) {
                        markTask(index, 'ignored');
                        state.last = `ignored@${index + 1}`;
                        updateStats();
                        addLog(`task#${index + 1} ignored`);
                        return Promise.resolve();
                    }
                    markTask(index, 'running');
                    addLog(`task#${index + 1} start`);
                    return task.fn().then(
                        (res) => {
                            if (ignoreOld && runId !== state.runId) {
                                markTask(index, 'ignored');
                                state.last = `ignored@${index + 1}`;
                                updateStats();
                                addLog(`task#${index + 1} ignored`);
                                return;
                            }
                            markTask(index, 'ok');
                            state.counters.done += 1;
                            state.last = `ok@${index + 1}`;
                            updateStats();
                            addLog(`task#${index + 1} ok -> ${JSON.stringify(res)}`);
                        },
                        (err) => {
                            if (ignoreOld && runId !== state.runId) {
                                markTask(index, 'ignored');
                                state.last = `ignored@${index + 1}`;
                                updateStats();
                                addLog(`task#${index + 1} ignored`);
                                return;
                            }
                            markTask(index, 'error');
                            state.counters.error += 1;
                            state.last = `error@${index + 1}`;
                            updateStats();
                            addLog(`task#${index + 1} error -> ${String(err && err.message ? err.message : err)}`);
                            if (stopOnError) throw err;
                        }
                    );
                };
            });

            try {
                await runPromisesInSeries(fns);
                if (ignoreOld && runId !== state.runId) {
                    setChip('statusChip', '已忽略', 'warn');
                    showNotification('结果已忽略（新 runId 已开始）', 'warning');
                    return;
                }
                setChip('statusChip', state.counters.error ? '完成（含错误）' : '完成', state.counters.error ? 'warn' : 'ok');
                showNotification(`串行完成：ok=${state.counters.done}, err=${state.counters.error}`, state.counters.error ? 'warning' : 'success');
            } catch (err) {
                if (ignoreOld && runId !== state.runId) {
                    setChip('statusChip', '已忽略', 'warn');
                    return;
                }
                setChip('statusChip', '已停止（错误）', 'warn');
                showNotification('遇到错误已停止', 'error');
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function showCode() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(runPromisesInSeries.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">runPromisesInSeries</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="series" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="series"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function resetAll() {
            state.runId += 1;
            setText('runChip', `runId ${state.runId}`);
            state.tasks = [];
            state.counters.done = 0;
            state.counters.error = 0;
            state.last = null;
            renderTasks();
            updateStats();
            clearLog();
            setChip('statusChip', '空闲', 'ok');
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const buildBtn = document.getElementById('buildBtn');
            const runBtn = document.getElementById('runBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            if (buildBtn) buildBtn.addEventListener('click', buildTasks);
            if (runBtn) runBtn.addEventListener('click', runSeries);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            buildTasks();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
