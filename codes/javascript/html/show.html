<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>show</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 22px;
        }

        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px 22px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 13px;
            color: #475569;
            line-height: 1.55;
        }

        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 16px;
            align-items: start;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
        }

        .card h2 {
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 12px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 108px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-row label {
            font-size: 13px;
            color: #334155;
            font-weight: 800;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
        }

        .img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            display: inline-block;
            margin: 5px;
            border-radius: 14px;
            border: 1px solid rgba(15, 23, 42, 0.08);
        }

        .btn {
            background: linear-gradient(135deg, #abcdf0 10%, #3b8ddf 90%);
            display: inline-block;
            color: #fff;
            border: none;
            padding: 10px 18px;
            outline: none;
            border-radius: 8px;
            transition: all .3s cubic-bezier(0.075, 0.82, 0.165, 1);
            cursor: pointer;
        }

        .btn:hover {
            background: linear-gradient(135deg, #88baec 10%, #1f80e0 90%);
        }

        .btn.secondary {
            background: #0f172a;
        }

        .btn.ghost {
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }

        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }

        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }

        .log {
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            min-height: 180px;
            max-height: 240px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>show / hide 自定义插件演示</h1>
            </div>
            <div class="subtitle">基于现有代码扩展：用 Select / InputNumber / Checkbox / Modal / Notification 控制图片显示，同时保持 show(...el) 的核心用法。</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>控制台</h2>

                <div class="form-row">
                    <label>动作</label>
                    <div id="modeSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>显示数量</label>
                        <div id="countInput"></div>
                    </div>
                    <div class="form-row">
                        <label>选择图片</label>
                        <div id="imgCheckbox"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button type="button" id="btn" class="btn">隐藏图片</button>
                    <button type="button" id="applyBtn" class="btn secondary">执行动作</button>
                    <button type="button" id="showCodeBtn" class="btn ghost">查看 show 代码</button>
                    <button type="button" id="resetBtn" class="btn ghost">重置</button>
                </div>

                <div class="chip-row">
                    <span id="statusChip" class="chip ok">就绪</span>
                    <span id="visibleChip" class="chip">可见：-</span>
                </div>

                <div class="chip-row" style="margin-top: 10px;">
                    <span class="chip" style="background:rgba(15,23,42,0.08); color:#0f172a;">提示：数量只对“显示”动作生效</span>
                </div>
            </div>

            <div class="card">
                <h2>预览与日志</h2>
                <div class="container" id="imgContainer">
                    <img src="https://www.eveningwater.com/img/rabbits/rabbit-1.png" alt="" class="img">
                    <img src="https://www.eveningwater.com/img/rabbits/rabbit-2.png" alt="" class="img">
                    <img src="https://www.eveningwater.com/img/rabbits/rabbit-3.png" alt="" class="img">
                    <img src="https://www.eveningwater.com/img/rabbits/rabbit-4.png" alt="" class="img">
                    <img src="https://www.eveningwater.com/img/rabbits/rabbit-5.png" alt="" class="img">
                    <img src="https://www.eveningwater.com/img/rabbits/rabbit-6.png" alt="" class="img">
                </div>
                <div id="logBox" class="log" style="margin-top:12px;"></div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const btn = document.querySelector('#btn');
        const imgList = document.querySelectorAll('.img');
        const show = (...el) => [...el].forEach(item => (item.style.display = ''));
        const hide = (...el) => [...el].forEach(item => (item.style.display = 'none'));
        let status = false;
        const showOrHide = (elements) => {
            status = !status;
            if (status) {
                hide(...elements);
                btn.textContent = '显示图片';
            } else {
                show(...elements);
                btn.textContent = '隐藏图片';
            }
        }

        const state = {
            plugins: {
                modal: null,
                notification: null,
                optionGroup: null,
                imgGroup: null
            },
            selects: {
                mode: null,
                modeNative: null
            },
            inputs: {
                count: null,
                countNative: null
            },
            optionDefs: [],
            imgDefs: [],
            lastMode: 'toggle'
        };

        const modeOptions = [
            { value: 'toggle', label: '切换显示/隐藏（toggle）' },
            { value: 'show', label: '显示（show）' },
            { value: 'hide', label: '隐藏（hide）' }
        ];

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getOption('showNotifications')) return;
            if (state.plugins.notification) {
                try {
                    state.plugins.notification.show(message, type);
                    return;
                } catch (e) {}
            }
            console.log(message);
        }

        function showModal(content) {
            if (state.plugins.modal) {
                try {
                    state.plugins.modal.alert(content);
                    return;
                } catch (e) {}
            }
            console.log(String(content).replace(/<[^>]*>/g, ''));
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = String(text);
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            box.scrollTop = box.scrollHeight;
        }

        function setupModeSelect() {
            const container = document.getElementById('modeSelect');
            if (!container) return;
            try {
                state.selects.mode = new Select({
                    container,
                    options: modeOptions,
                    placeholder: '选择动作',
                    onChange: () => {
                        if (getOption('autoRun')) runAction();
                    }
                });
                state.selects.mode.setValue('toggle');
            } catch (e) {
                const select = document.createElement('select');
                select.className = 'text-input';
                modeOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'toggle';
                select.addEventListener('change', () => {
                    if (getOption('autoRun')) runAction();
                });
                container.appendChild(select);
                state.selects.modeNative = select;
            }
        }

        function getMode() {
            if (state.selects.mode && typeof state.selects.mode.getValue === 'function') {
                try {
                    return state.selects.mode.getValue() || 'toggle';
                } catch (e) {}
            }
            return state.selects.modeNative ? state.selects.modeNative.value : 'toggle';
        }

        function setupCountInput() {
            const container = document.getElementById('countInput');
            if (!container) return;
            try {
                state.inputs.count = new InputNumber({
                    container,
                    min: 0,
                    max: imgList.length,
                    step: 1,
                    value: imgList.length,
                    onChange: () => {
                        if (getOption('autoRun')) runAction();
                    }
                });
            } catch (e) {
                const input = document.createElement('input');
                input.type = 'number';
                input.min = '0';
                input.max = String(imgList.length);
                input.step = '1';
                input.value = String(imgList.length);
                input.className = 'text-input';
                input.id = 'countNative';
                input.addEventListener('input', () => {
                    if (getOption('autoRun')) runAction();
                });
                container.appendChild(input);
                state.inputs.countNative = input;
            }
        }

        function getCount() {
            if (state.inputs.count && typeof state.inputs.count.getValue === 'function') {
                try {
                    const n = Number(state.inputs.count.getValue());
                    if (Number.isFinite(n)) return Math.max(0, Math.min(imgList.length, Math.round(n)));
                } catch (e) {}
            }
            if (state.inputs.countNative) {
                const n = Number(state.inputs.countNative.value);
                if (Number.isFinite(n)) return Math.max(0, Math.min(imgList.length, Math.round(n)));
            }
            return imgList.length;
        }

        function setupOptions() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoRun', label: '配置变化自动执行', checked: true },
                { id: 'onlyChecked', label: '仅操作勾选图片', checked: false },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.optionDefs = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {
                        if (getOption('autoRun')) runAction();
                    }
                });
                container.appendChild(group.container);
                state.plugins.optionGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
                options.forEach(option => {
                    const el = document.getElementById(option.id);
                    if (el) el.addEventListener('change', () => {
                        if (getOption('autoRun')) runAction();
                    });
                });
            }
        }

        function getOption(id) {
            if (state.plugins.optionGroup) {
                try {
                    const states = state.plugins.optionGroup.getAllChecked();
                    const index = state.optionDefs.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupImageCheckboxes() {
            const container = document.getElementById('imgCheckbox');
            if (!container) return;
            const defs = Array.from(imgList).map((_, idx) => ({
                id: `img_${idx}`,
                label: `#${idx + 1}`,
                checked: true,
                index: idx
            }));
            state.imgDefs = defs;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: defs.map(d => ({ id: d.id, label: d.label, checked: d.checked })),
                    onChange: () => {
                        if (getOption('autoRun')) runAction();
                    }
                });
                container.appendChild(group.container);
                state.plugins.imgGroup = group;
            } catch (e) {
                defs.forEach(d => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${d.id}" checked><label for="${d.id}" style="margin-left:8px; cursor:pointer;">${d.label}</label>`;
                    container.appendChild(div);
                });
                defs.forEach(d => {
                    const el = document.getElementById(d.id);
                    if (el) el.addEventListener('change', () => {
                        if (getOption('autoRun')) runAction();
                    });
                });
            }
        }

        function getTargetImages() {
            const all = Array.from(imgList);
            if (!getOption('onlyChecked')) return all;

            if (state.plugins.imgGroup) {
                try {
                    const states = state.plugins.imgGroup.getAllChecked();
                    return state.imgDefs.filter((_, idx) => Boolean(states[idx])).map(d => all[d.index]);
                } catch (e) {}
            }

            return state.imgDefs
                .filter(d => {
                    const el = document.getElementById(d.id);
                    return el ? el.checked : false;
                })
                .map(d => all[d.index]);
        }

        function countVisible() {
            return Array.from(imgList).filter(img => img.style.display !== 'none').length;
        }

        function updateVisibleChip() {
            setChip('visibleChip', `可见：${countVisible()}/${imgList.length}`);
        }

        function runAction() {
            const mode = getMode();
            const targets = getTargetImages();
            const count = getCount();
            state.lastMode = mode;

            if (mode === 'toggle') {
                showOrHide(targets);
                addLog(`toggle(${targets.length})`);
                setChip('statusChip', '已切换', 'ok');
                updateVisibleChip();
                showNotification('已切换显示状态', 'success');
                return;
            }

            if (mode === 'hide') {
                hide(...targets);
                status = true;
                btn.textContent = '显示图片';
                addLog(`hide(${targets.length})`);
                setChip('statusChip', '已隐藏', 'warn');
                updateVisibleChip();
                showNotification('已隐藏', 'warning');
                return;
            }

            const list = Array.from(imgList);
            const set = new Set(targets);
            const picked = list.filter(img => set.has(img)).slice(0, count);
            const othersInTarget = list.filter(img => set.has(img) && !picked.includes(img));
            show(...picked);
            hide(...othersInTarget);
            addLog(`show(${picked.length}) / hide(${othersInTarget.length})`);
            setChip('statusChip', '已显示', 'ok');
            status = false;
            btn.textContent = '隐藏图片';
            updateVisibleChip();
            showNotification('已显示', 'success');
        }

        function showCode() {
            if (!getOption('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(show.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">show</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="show" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="show"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function resetAll() {
            show(...imgList);
            status = false;
            btn.textContent = '隐藏图片';
            if (state.selects.mode && typeof state.selects.mode.setValue === 'function') {
                try {
                    state.selects.mode.setValue('toggle');
                } catch (e) {}
            }
            if (state.selects.modeNative) state.selects.modeNative.value = 'toggle';
            if (state.inputs.count && typeof state.inputs.count.setValue === 'function') {
                try {
                    state.inputs.count.setValue(imgList.length);
                } catch (e) {}
            }
            if (state.inputs.countNative) state.inputs.countNative.value = String(imgList.length);
            setChip('statusChip', '就绪', 'ok');
            addLog('reset');
            updateVisibleChip();
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const applyBtn = document.getElementById('applyBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            if (btn) btn.addEventListener('click', () => showOrHide(getTargetImages()));
            if (applyBtn) applyBtn.addEventListener('click', runAction);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupModeSelect();
            setupCountInput();
            setupOptions();
            setupImageCheckboxes();
            bindEvents();
            updateVisibleChip();
            addLog('ready');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>

</html>
