<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sleep</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }

        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 13px;
            color: #475569;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 18px;
            align-items: start;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
        }

        .card h2 {
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 108px 1fr;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row label {
            font-size: 13px;
            color: #334155;
            font-weight: 800;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.12s ease;
        }

        button:active {
            transform: translateY(1px);
        }

        .primary {
            background: #2563eb;
            color: #fff;
        }

        .secondary {
            background: #0f172a;
            color: #fff;
        }

        .ghost {
            background: rgba(15, 23, 42, 0.08);
            color: #0f172a;
        }

        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }

        .chip-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
        }

        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }

        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }

        .progress {
            height: 10px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, rgba(37, 99, 235, 0.9), rgba(16, 185, 129, 0.85));
            border-radius: 999px;
            transition: width 0.12s ease;
        }

        .log {
            background: #0b1220;
            color: #e2e8f0;
            border-radius: 14px;
            padding: 12px;
            min-height: 260px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
            margin-top: 12px;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>sleep 自定义插件演示</h1>
            </div>
            <div class="subtitle">用 <code>sleep(ms)</code> 做延迟/节流式流程控制：单次等待或串行等待，并用插件替代原生输入与提示。</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>模式</label>
                    <div id="modeSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>延迟(ms)</label>
                        <div id="msInput"></div>
                    </div>
                    <div class="form-row">
                        <label>次数</label>
                        <div id="countInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="runBtn" class="primary">开始</button>
                    <button id="cancelBtn" class="secondary">取消</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="hint">“取消”通过 runId 忽略旧任务后续结果，不会中断 setTimeout 本身，但能停止后续 UI 更新。</div>
            </div>

            <div class="card">
                <h2>执行状态</h2>
                <div class="stage">
                    <div class="chip-row">
                        <span id="statusChip" class="chip ok">空闲</span>
                        <span id="runChip" class="chip">runId 0</span>
                        <span id="stepChip" class="chip">step 0/0</span>
                        <span id="elapsedChip" class="chip">elapsed 0ms</span>
                    </div>
                    <div class="progress">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <div id="logBox" class="log"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                mode: null,
                modeNative: null
            },
            inputs: {
                ms: null,
                msNative: null,
                count: null,
                countNative: null
            },
            checkboxOptions: [],
            runId: 0,
            running: false,
            startedAt: 0
        };

        const modeOptions = [
            { value: 'once', label: '单次等待（await sleep）' },
            { value: 'series', label: '串行多次（循环 await sleep）' },
            { value: 'pulse', label: '节拍输出（每次等待后打印）' }
        ];

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(String(content).replace(/<[^>]*>/g, ''));
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = String(text);
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setProgress(pct) {
            const bar = document.getElementById('progressBar');
            if (!bar) return;
            const p = Math.max(0, Math.min(100, pct));
            bar.style.width = `${p.toFixed(1)}%`;
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            if (getCheckboxValue('autoScrollLog')) box.scrollTop = box.scrollHeight;
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'ignoreOldResults', label: '忽略旧任务结果（runId）', checked: true },
                { id: 'autoScrollLog', label: '日志自动滚动', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const container = document.getElementById('modeSelect');
            if (!container) return;
            try {
                state.selects.mode = new Select({
                    container,
                    options: modeOptions,
                    placeholder: '选择模式',
                    onChange: () => {}
                });
                state.selects.mode.setValue('series');
            } catch (e) {
                const select = document.createElement('select');
                select.className = 'text-input';
                modeOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'series';
                container.appendChild(select);
                state.selects.modeNative = select;
            }
        }

        function getMode() {
            if (state.selects.mode && typeof state.selects.mode.getValue === 'function') {
                try {
                    return state.selects.mode.getValue() || 'series';
                } catch (e) {}
            }
            return state.selects.modeNative ? state.selects.modeNative.value : 'series';
        }

        function setupInputs() {
            const msContainer = document.getElementById('msInput');
            const countContainer = document.getElementById('countInput');

            if (msContainer) {
                try {
                    state.inputs.ms = new InputNumber({
                        container: msContainer,
                        min: 0,
                        max: 5000,
                        step: 50,
                        value: 400,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '5000';
                    input.step = '50';
                    input.value = '400';
                    input.className = 'text-input';
                    input.id = 'msNative';
                    msContainer.appendChild(input);
                    state.inputs.msNative = input;
                }
            }

            if (countContainer) {
                try {
                    state.inputs.count = new InputNumber({
                        container: countContainer,
                        min: 1,
                        max: 30,
                        step: 1,
                        value: 8,
                        onChange: () => {}
                    });
                } catch (e) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '1';
                    input.max = '30';
                    input.step = '1';
                    input.value = '8';
                    input.className = 'text-input';
                    input.id = 'countNative';
                    countContainer.appendChild(input);
                    state.inputs.countNative = input;
                }
            }
        }

        function getNumberFromInput(plugin, nativeId, fallback) {
            if (plugin && typeof plugin.getValue === 'function') {
                try {
                    const n = Number(plugin.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            const native = document.getElementById(nativeId);
            if (native) {
                const n = Number(native.value);
                if (Number.isFinite(n)) return n;
            }
            return fallback;
        }

        function getMs() {
            const ms = Math.round(getNumberFromInput(state.inputs.ms, 'msNative', 400));
            return Math.max(0, Math.min(5000, ms));
        }

        function getCount() {
            const c = Math.round(getNumberFromInput(state.inputs.count, 'countNative', 8));
            return Math.max(1, Math.min(30, c));
        }

        function updateElapsed() {
            const elapsed = state.startedAt ? Math.max(0, Math.round(performance.now() - state.startedAt)) : 0;
            setChip('elapsedChip', `elapsed ${elapsed}ms`);
        }

        function cancel() {
            state.runId += 1;
            state.running = false;
            setChip('runChip', `runId ${state.runId}`);
            setChip('statusChip', '已取消', 'warn');
            setChip('stepChip', 'step 0/0');
            setProgress(0);
            showNotification('已取消（旧任务结果将被忽略）', 'info');
            addLog('cancel');
        }

        async function run() {
            if (state.running) cancel();
            state.runId += 1;
            const runId = state.runId;
            state.running = true;
            state.startedAt = performance.now();
            clearLog();
            setProgress(0);
            setChip('runChip', `runId ${runId}`);
            setChip('statusChip', '运行中', 'warn');

            const mode = getMode();
            const ms = getMs();
            const count = mode === 'once' ? 1 : getCount();
            setChip('stepChip', `step 0/${count}`);
            addLog(`start mode=${mode}, ms=${ms}, count=${count}`);

            try {
                for (let i = 0; i < count; i++) {
                    if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) return;
                    setChip('stepChip', `step ${i + 1}/${count}`);
                    setProgress(((i) / count) * 100);
                    updateElapsed();

                    if (mode === 'pulse') addLog(`pulse#${i + 1} waiting...`);
                    await sleep(ms);

                    if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) return;
                    if (mode === 'pulse') addLog(`pulse#${i + 1} done`);
                }

                if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) return;
                setProgress(100);
                updateElapsed();
                setChip('statusChip', '完成', 'ok');
                state.running = false;
                const elapsed = Math.max(0, Math.round(performance.now() - state.startedAt));
                addLog(`done elapsed=${elapsed}ms`);
                showNotification('已完成', 'success');

                showModal(`
                    <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                        <div style="font-weight:900; margin-bottom:10px;">sleep 完成</div>
                        <div style="color:#475569; margin-bottom:6px;">mode: <code>${escapeHtml(mode)}</code></div>
                        <div style="color:#475569; margin-bottom:6px;">ms: <code>${ms}</code></div>
                        <div style="color:#475569; margin-bottom:6px;">count: <code>${count}</code></div>
                        <div style="color:#475569;">elapsed: <code>${elapsed}ms</code></div>
                    </div>
                `);
            } catch (e) {
                if (getCheckboxValue('ignoreOldResults') && runId !== state.runId) return;
                state.running = false;
                setChip('statusChip', '失败', 'warn');
                const msg = String(e && e.message ? e.message : e);
                addLog(`error: ${msg}`);
                showNotification('执行失败', 'error');
                showModal(`<div style="padding:12px 8px; font-size:14px; color:#1f2937;"><div style="font-weight:900; margin-bottom:10px;">执行失败</div><pre style="margin:0; padding:12px; border-radius:12px; background:#0b1220; color:#e2e8f0; overflow:auto; line-height:1.55; font-size:12px;">${escapeHtml(msg)}</pre></div>`);
            }
        }

        function showCode() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(sleep.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">sleep</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="sleep" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="sleep"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function resetAll() {
            cancel();
            clearLog();
            setChip('statusChip', '空闲', 'ok');
            setChip('runChip', `runId ${state.runId}`);
            setChip('stepChip', 'step 0/0');
            setChip('elapsedChip', 'elapsed 0ms');
            setProgress(0);
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const runBtn = document.getElementById('runBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            if (runBtn) runBtn.addEventListener('click', run);
            if (cancelBtn) cancelBtn.addEventListener('click', cancel);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            resetAll();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
