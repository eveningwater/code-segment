<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sdbm</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1220px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 20px;
        }
        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 800;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        textarea.input {
            width: 100%;
            min-height: 160px;
            resize: vertical;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 12px;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            background: #f8fafc;
            color: #0f172a;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        textarea.input:focus {
            border-color: #93c5fd;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
            background: #ffffff;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 560px) {
            .row-2 {
                grid-template-columns: 1fr;
            }
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .stage {
            min-height: 520px;
            border-radius: 18px;
            border: 2px dashed #cbd5e1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 18px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .stage-title {
            font-weight: 900;
            font-size: 1.05rem;
            color: #0f172a;
        }
        .stage-sub {
            color: #64748b;
            font-size: 0.9rem;
        }
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }
        .chip.ok {
            background: rgba(16, 185, 129, 0.15);
            color: #065f46;
        }
        .chip.warn {
            background: rgba(245, 158, 11, 0.18);
            color: #92400e;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
        .list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            align-content: start;
        }
        .item {
            border-radius: 14px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            padding: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .item:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.10);
        }
        .item-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            background: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
            white-space: nowrap;
        }
        .item-value {
            color: #334155;
            font-size: 12px;
            line-height: 1.55;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            word-break: break-word;
        }
        .log {
            background: #0f172a;
            color: #f8fafc;
            border-radius: 14px;
            padding: 12px 14px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.65;
            font-size: 13px;
            min-height: 220px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>sdbm 自定义插件演示</h1>
            </div>
            <div class="subtitle">参照 run-async：输入字符串生成 hash，并演示取模分桶/碰撞风险</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>输入与配置</h2>

                <div class="form-row">
                    <label>示例选择</label>
                    <div id="exampleSelect"></div>
                </div>

                <div class="row-2">
                    <div class="form-row">
                        <label>桶数量 (mod)</label>
                        <div id="bucketInput"></div>
                    </div>
                    <div class="form-row">
                        <label>批量生成数量</label>
                        <div id="countInput"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="calcBtn" class="secondary">计算 hash</button>
                    <button id="batchBtn" class="secondary">批量生成</button>
                    <button id="showCodeBtn" class="ghost">查看代码</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>

                <div class="form-row">
                    <label>输入字符串</label>
                    <textarea id="inputText" class="input" placeholder="输入任意字符串..."></textarea>
                </div>

                <div class="hint">
                    注意：sdbm 是非加密 hash，会有碰撞；这里只做分桶/采样等用途演示。
                </div>
            </div>

            <div class="card">
                <h2>输出与分桶</h2>
                <div class="stage">
                    <div class="stage-head">
                        <div>
                            <div class="stage-title">Hash Result</div>
                            <div class="stage-sub">显示 signed / unsigned / bucketIndex，并统计碰撞</div>
                        </div>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <span id="statusChip" class="chip ok">就绪</span>
                            <span id="modeChip" class="chip">单次</span>
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">signed hash</div>
                            <div class="stat-value" id="signedValue">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">unsigned (>>>0)</div>
                            <div class="stat-value" id="unsignedValue">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">bucket</div>
                            <div class="stat-value" id="bucketValue">-</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">碰撞数</div>
                            <div class="stat-value" id="collisionValue">0</div>
                        </div>
                    </div>

                    <div id="bucketList" class="list"></div>

                    <div class="form-row">
                        <label>日志</label>
                        <div id="logBox" class="log"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const sdbm = str => {
            let arr = str.split('');
            return arr.reduce(
                (hashCode, currentVal) =>
                (hashCode =
                    currentVal.charCodeAt(0) +
                    (hashCode << 6) +
                    (hashCode << 16) -
                    hashCode),
                0
            );
        };

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                example: null,
                exampleNative: null
            },
            inputs: {
                bucket: null,
                count: null
            },
            checkboxOptions: [],
            lastBuckets: null
        };

        const examples = {
            userId: { label: '用户 id（灰度）', value: 'user_1024' },
            url: { label: 'URL（缓存 key）', value: 'https://example.com/api/list?page=1&size=20' },
            text: { label: '文本内容（去重）', value: 'hello world hello world' },
            collision: { label: '可能碰撞（示意）', value: 'AaAaAa' }
        };
        const exampleOptions = Object.entries(examples).map(([value, item]) => ({ value, label: item.label }));

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (e) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;
            const options = [
                { id: 'autoRun', label: '输入变化自动计算', checked: true },
                { id: 'autoScrollLog', label: '日志自动滚动', checked: true },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalDetail', label: '弹窗展示代码', checked: true }
            ];
            state.checkboxOptions = options;
            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (e) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (e) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function setupSelects() {
            const container = document.getElementById('exampleSelect');
            if (!container) return;
            try {
                state.selects.example = new Select({
                    container,
                    options: exampleOptions,
                    placeholder: '选择示例',
                    onChange: () => {
                        applyExample();
                    }
                });
                state.selects.example.setValue('userId');
            } catch (e) {
                const select = document.createElement('select');
                select.className = 'input-field';
                exampleOptions.forEach(option => {
                    const opt = document.createElement('option');
                    opt.value = option.value;
                    opt.textContent = option.label;
                    select.appendChild(opt);
                });
                select.value = 'userId';
                select.addEventListener('change', applyExample);
                container.appendChild(select);
                state.selects.exampleNative = select;
            }
        }

        function getExampleKey() {
            if (state.selects.example && typeof state.selects.example.getValue === 'function') {
                return state.selects.example.getValue() || 'userId';
            }
            return state.selects.exampleNative ? state.selects.exampleNative.value : 'userId';
        }

        function setupInputs() {
            const bucketContainer = document.getElementById('bucketInput');
            const countContainer = document.getElementById('countInput');

            if (bucketContainer) {
                try {
                    state.inputs.bucket = new InputNumber({
                        container: bucketContainer,
                        min: 1,
                        max: 512,
                        step: 1,
                        value: 100,
                        onChange: () => {
                            if (getCheckboxValue('autoRun')) calc();
                        }
                    });
                } catch (e) {}
            }

            if (countContainer) {
                try {
                    state.inputs.count = new InputNumber({
                        container: countContainer,
                        min: 1,
                        max: 5000,
                        step: 1,
                        value: 300,
                        onChange: () => {}
                    });
                } catch (e) {}
            }
        }

        function getNumber(plugin, defaultValue) {
            if (plugin && typeof plugin.getValue === 'function') {
                try {
                    const n = Number(plugin.getValue());
                    if (Number.isFinite(n)) return n;
                } catch (e) {}
            }
            return defaultValue;
        }

        function getBucketCount() {
            return Math.min(512, Math.max(1, Math.round(getNumber(state.inputs.bucket, 100))));
        }

        function getBatchCount() {
            return Math.min(5000, Math.max(1, Math.round(getNumber(state.inputs.count, 300))));
        }

        function setChip(id, text, variant) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = text;
            el.className = `chip${variant ? ' ' + variant : ''}`;
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = String(text);
        }

        function addLog(line) {
            const box = document.getElementById('logBox');
            if (!box) return;
            const t = new Date().toLocaleTimeString('zh-CN');
            box.textContent += `[${t}] ${line}\n`;
            if (getCheckboxValue('autoScrollLog')) box.scrollTop = box.scrollHeight;
        }

        function clearLog() {
            const box = document.getElementById('logBox');
            if (box) box.textContent = '';
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function normalizeCode(code) {
            const raw = String(code ?? '');
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            while (lines.length && !lines[0].trim()) lines.shift();
            while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
            const indents = lines
                .filter(line => line.trim())
                .map(line => (line.match(/^\s+/) ? line.match(/^\s+/)[0].length : 0));
            const minIndent = indents.length ? Math.min(...indents) : 0;
            return lines.map(line => line.slice(minIndent)).join('\n');
        }

        function showCode() {
            if (!getCheckboxValue('showModalDetail')) {
                showNotification('弹窗已关闭', 'info');
                return;
            }
            const code = normalizeCode(sdbm.toString());
            const content = `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">sdbm</div>
                    <pre style="margin:0; padding:10px 12px; border-radius:10px; border:1px solid #e2e8f0; overflow:auto; max-height:420px;"><code data-highlight="sdbm" class="language-javascript">${escapeHtml(code)}</code></pre>
                </div>
            `;
            showModal(content);
            setTimeout(() => {
                if (!window.hljs) return;
                document.querySelectorAll('code[data-highlight="sdbm"]').forEach((el) => window.hljs.highlightElement(el));
            }, 0);
        }

        function applyExample() {
            const key = getExampleKey();
            const ex = examples[key] || examples.userId;
            const input = document.getElementById('inputText');
            if (!input) return;
            input.value = ex.value;
            showNotification('已应用示例', 'info');
            if (getCheckboxValue('autoRun')) calc();
        }

        function renderBuckets(buckets, collisions) {
            const list = document.getElementById('bucketList');
            if (!list) return;
            list.innerHTML = '';
            const sorted = buckets.slice().sort((a, b) => b.count - a.count).slice(0, 18);
            sorted.forEach(item => {
                const el = document.createElement('div');
                el.className = 'item';
                el.innerHTML = `
                    <div class="item-title">
                        <span>bucket</span>
                        <span class="badge">#${item.index}</span>
                    </div>
                    <div class="item-value">count=${item.count}</div>
                `;
                el.addEventListener('click', () => {
                    const content = `
                        <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                            <div style="font-weight:900; margin-bottom:10px;">Bucket #${item.index}</div>
                            <div style="margin-bottom:8px;">count：<strong>${item.count}</strong></div>
                            <div style="margin-bottom:8px;">说明：这里展示的是批量生成时落入该桶的数量。</div>
                        </div>
                    `;
                    showModal(content);
                });
                list.appendChild(el);
            });
            setText('collisionValue', collisions);
        }

        function calc() {
            const input = document.getElementById('inputText');
            const str = input ? input.value : '';
            const mod = getBucketCount();
            if (!str) {
                setChip('statusChip', '空输入', 'warn');
                setText('signedValue', '-');
                setText('unsignedValue', '-');
                setText('bucketValue', '-');
                setText('collisionValue', '0');
                showNotification('请输入字符串', 'warning');
                return;
            }
            const signed = sdbm(str);
            const unsigned = signed >>> 0;
            const bucket = mod ? (unsigned % mod) : 0;
            setChip('statusChip', '已计算', 'ok');
            setChip('modeChip', '单次');
            setText('signedValue', signed);
            setText('unsignedValue', unsigned);
            setText('bucketValue', `${bucket} / ${mod}`);
            addLog(`sdbm("${str.slice(0, 30)}") => signed=${signed}, unsigned=${unsigned}, bucket=${bucket}/${mod}`);
            showNotification('已计算 hash', 'success');
        }

        function batch() {
            const input = document.getElementById('inputText');
            const base = input ? input.value : '';
            const mod = getBucketCount();
            const count = getBatchCount();
            if (!base) {
                showNotification('请输入字符串', 'warning');
                return;
            }
            const buckets = Array.from({ length: mod }, (_, i) => ({ index: i, count: 0 }));
            const seen = new Map();
            let collisions = 0;
            clearLog();
            setChip('statusChip', '批量中', 'warn');
            setChip('modeChip', `批量 x${count}`);

            for (let i = 0; i < count; i++) {
                const key = `${base}_${i}`;
                const signed = sdbm(key);
                const unsigned = signed >>> 0;
                const b = unsigned % mod;
                buckets[b].count += 1;
                const prev = seen.get(unsigned);
                if (prev && prev !== key) collisions += 1;
                else seen.set(unsigned, key);
            }

            renderBuckets(buckets, collisions);
            setChip('statusChip', '批量完成', 'ok');
            addLog(`batch base="${base}" count=${count} mod=${mod} collisions=${collisions}`);
            showNotification(`批量完成：${count} 条`, 'success');
        }

        function resetAll() {
            const input = document.getElementById('inputText');
            if (input) input.value = '';
            clearLog();
            setChip('statusChip', '就绪', 'ok');
            setChip('modeChip', '单次');
            setText('signedValue', '-');
            setText('unsignedValue', '-');
            setText('bucketValue', '-');
            setText('collisionValue', '0');
            const list = document.getElementById('bucketList');
            if (list) list.innerHTML = '';
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const calcBtn = document.getElementById('calcBtn');
            const batchBtn = document.getElementById('batchBtn');
            const showCodeBtn = document.getElementById('showCodeBtn');
            const resetBtn = document.getElementById('resetBtn');
            const input = document.getElementById('inputText');

            if (calcBtn) calcBtn.addEventListener('click', calc);
            if (batchBtn) batchBtn.addEventListener('click', batch);
            if (showCodeBtn) showCodeBtn.addEventListener('click', showCode);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);

            if (input) {
                input.addEventListener('input', () => {
                    if (getCheckboxValue('autoRun')) calc();
                });
            }
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputs();
            bindEvents();
            applyExample();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
