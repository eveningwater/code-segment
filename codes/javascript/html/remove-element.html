<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>remove-element</title>
    <link rel="stylesheet" href="../../demo/plugins/modal/style.css">
    <link rel="stylesheet" href="../../demo/plugins/notification/style.css">
    <link rel="stylesheet" href="../../demo/plugins/input-number/style.css">
    <link rel="stylesheet" href="../../demo/plugins/select/style.css">
    <link rel="stylesheet" href="../../demo/plugins/checkbox/style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9;
            color: #0f172a;
            padding: 32px;
        }
        .page {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .header {
            background: #ffffff;
            border-radius: 18px;
            padding: 24px 28px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .title-row h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .subtitle {
            margin-top: 8px;
            color: #64748b;
            font-size: 0.95rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card h2 {
            font-size: 1.2rem;
            font-weight: 700;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-row label {
            font-size: 0.9rem;
            color: #475569;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .actions button {
            border: none;
            background: #2563eb;
            color: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .actions button.secondary {
            background: #0f766e;
        }
        .actions button.ghost {
            background: #e2e8f0;
            color: #1e293b;
        }
        .actions button:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
        }
        .demo-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .demo-container {
            border-radius: 16px;
            background: #e2e8f0;
            padding: 14px;
            min-height: 220px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            align-content: start;
        }
        .demo-item {
            background: #ffffff;
            border-radius: 14px;
            padding: 12px 10px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .demo-item:hover {
            transform: translateY(-1px);
        }
        .demo-item-title {
            font-weight: 800;
            font-size: 0.95rem;
            color: #0f172a;
        }
        .demo-item-meta {
            font-size: 0.82rem;
            color: #64748b;
            word-break: break-all;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .stat {
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .stat-label {
            color: #64748b;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: #0f172a;
            word-break: break-all;
        }
        .hint {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.7;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 12px 14px;
        }
        .empty {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 12px;
            color: #64748b;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="header">
            <div class="title-row">
                <h1>removeElement 自定义插件演示</h1>
            </div>
            <div class="subtitle">使用 InputNumber / Select / Checkbox / Modal / Notification 构建 removeElement 示例</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>配置面板</h2>

                <div class="form-row">
                    <label>生成元素类型</label>
                    <div id="typeSelect"></div>
                </div>

                <div class="form-row">
                    <label>生成数量</label>
                    <div id="countInput"></div>
                </div>

                <div class="form-row">
                    <label>移除策略</label>
                    <div id="strategySelect"></div>
                </div>

                <div class="form-row">
                    <label>索引（用于“按索引移除”）</label>
                    <div id="indexInput"></div>
                </div>

                <div class="form-row">
                    <label>选项</label>
                    <div id="optionCheckbox"></div>
                </div>

                <div class="actions">
                    <button id="generateBtn">生成元素</button>
                    <button id="removeBtn" class="secondary">执行移除</button>
                    <button id="reportBtn" class="ghost">查看报告</button>
                    <button id="resetBtn" class="ghost">重置</button>
                </div>
            </div>

            <div class="card">
                <h2>演示区</h2>
                <div class="hint" id="hintText">提示：勾选“点击元素即移除”后，点击右侧任意元素即可触发 removeElement</div>
                <div class="demo-zone">
                    <div class="demo-container" id="demoContainer"></div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">已生成</div>
                            <div class="stat-value" id="createdValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">剩余</div>
                            <div class="stat-value" id="remainingValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">已移除</div>
                            <div class="stat-value" id="removedValue">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">最近移除</div>
                            <div class="stat-value" id="lastRemovedValue">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../demo/plugins/modal/index.js"></script>
    <script src="../../demo/plugins/notification/index.js"></script>
    <script src="../../demo/plugins/input-number/index.js"></script>
    <script src="../../demo/plugins/select/index.js"></script>
    <script src="../../demo/plugins/checkbox/index.js"></script>
    <script>
        const removeElement = el => {
            if (el && el.parentNode) el.parentNode.removeChild(el);
        };

        const typeOptions = [
            { value: 'div', label: 'div' },
            { value: 'button', label: 'button' },
            { value: 'p', label: 'p' },
            { value: 'span', label: 'span' }
        ];

        const strategyOptions = [
            { value: 'first', label: '移除第一个' },
            { value: 'last', label: '移除最后一个' },
            { value: 'random', label: '随机移除' },
            { value: 'index', label: '按索引移除' }
        ];

        const state = {
            plugins: {
                modal: null,
                notification: null,
                checkboxGroup: null
            },
            selects: {
                type: null,
                typeNative: null,
                strategy: null,
                strategyNative: null
            },
            inputs: {
                count: null,
                index: null
            },
            checkboxOptions: [],
            stats: {
                created: 0,
                remaining: 0,
                removed: 0,
                lastRemoved: null
            },
            history: []
        };

        function initPlugins() {
            try {
                state.plugins.modal = new Modal();
                state.plugins.notification = new Notification({ position: 'top-right' });
            } catch (error) {}
        }

        function showNotification(message, type = 'info') {
            if (!getCheckboxValue('showNotifications')) return;
            if (state.plugins.notification) {
                state.plugins.notification.show(message, type);
            } else {
                console.log(message);
            }
        }

        function showModal(content) {
            if (state.plugins.modal) {
                state.plugins.modal.alert(content);
            } else {
                console.log(content);
            }
        }

        async function confirmRemove(message) {
            if (!getCheckboxValue('confirmBeforeRemove')) return true;
            if (state.plugins.modal && typeof state.plugins.modal.confirm === 'function') {
                return await state.plugins.modal.confirm(message);
            }
            return true;
        }

        function setupInputNumbers() {
            const countContainer = document.getElementById('countInput');
            const indexContainer = document.getElementById('indexInput');

            if (countContainer) {
                try {
                    state.inputs.count = new InputNumber({
                        container: countContainer,
                        min: 1,
                        max: 40,
                        step: 1,
                        value: 12,
                        onChange: () => {
                            if (getCheckboxValue('autoGenerate')) generateElements();
                        }
                    });
                } catch (error) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '1';
                    input.max = '40';
                    input.step = '1';
                    input.value = '12';
                    input.className = 'input-field';
                    input.id = 'countInputNative';
                    countContainer.appendChild(input);
                    input.addEventListener('input', () => {
                        if (getCheckboxValue('autoGenerate')) generateElements();
                    });
                }
            }

            if (indexContainer) {
                try {
                    state.inputs.index = new InputNumber({
                        container: indexContainer,
                        min: 0,
                        max: 39,
                        step: 1,
                        value: 0,
                        onChange: () => {}
                    });
                } catch (error) {
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = '0';
                    input.max = '39';
                    input.step = '1';
                    input.value = '0';
                    input.className = 'input-field';
                    input.id = 'indexInputNative';
                    indexContainer.appendChild(input);
                }
            }
        }

        function getCountValue() {
            if (state.inputs.count && typeof state.inputs.count.getValue === 'function') {
                try {
                    return Number(state.inputs.count.getValue());
                } catch (error) {}
            }
            const native = document.getElementById('countInputNative');
            return native ? Number(native.value) : 0;
        }

        function getIndexValue() {
            if (state.inputs.index && typeof state.inputs.index.getValue === 'function') {
                try {
                    return Number(state.inputs.index.getValue());
                } catch (error) {}
            }
            const native = document.getElementById('indexInputNative');
            return native ? Number(native.value) : 0;
        }

        function setupSelects() {
            const typeContainer = document.getElementById('typeSelect');
            const strategyContainer = document.getElementById('strategySelect');

            if (typeContainer) {
                try {
                    state.selects.type = new Select({
                        container: typeContainer,
                        options: typeOptions,
                        placeholder: '选择元素类型',
                        onChange: () => {
                            if (getCheckboxValue('autoGenerate')) generateElements();
                        }
                    });
                    state.selects.type.setValue('div');
                } catch (error) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    typeOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'div';
                    select.addEventListener('change', () => {
                        if (getCheckboxValue('autoGenerate')) generateElements();
                    });
                    typeContainer.appendChild(select);
                    state.selects.typeNative = select;
                }
            }

            if (strategyContainer) {
                try {
                    state.selects.strategy = new Select({
                        container: strategyContainer,
                        options: strategyOptions,
                        placeholder: '选择移除策略',
                        onChange: () => {}
                    });
                    state.selects.strategy.setValue('first');
                } catch (error) {
                    const select = document.createElement('select');
                    select.className = 'input-field';
                    strategyOptions.forEach(option => {
                        const opt = document.createElement('option');
                        opt.value = option.value;
                        opt.textContent = option.label;
                        select.appendChild(opt);
                    });
                    select.value = 'first';
                    strategyContainer.appendChild(select);
                    state.selects.strategyNative = select;
                }
            }
        }

        function getTypeValue() {
            if (state.selects.type && typeof state.selects.type.getValue === 'function') {
                return state.selects.type.getValue() || 'div';
            }
            return state.selects.typeNative ? state.selects.typeNative.value : 'div';
        }

        function getStrategyValue() {
            if (state.selects.strategy && typeof state.selects.strategy.getValue === 'function') {
                return state.selects.strategy.getValue() || 'first';
            }
            return state.selects.strategyNative ? state.selects.strategyNative.value : 'first';
        }

        function setupCheckboxes() {
            const container = document.getElementById('optionCheckbox');
            if (!container) return;

            const options = [
                { id: 'clickToRemove', label: '点击元素即移除', checked: true },
                { id: 'confirmBeforeRemove', label: '移除前确认', checked: true },
                { id: 'autoGenerate', label: '修改配置自动生成', checked: false },
                { id: 'showNotifications', label: '显示通知', checked: true },
                { id: 'showModalReport', label: '使用弹窗展示报告', checked: true }
            ];

            state.checkboxOptions = options;

            try {
                const group = Checkbox.createCheckboxGroup({
                    items: options.map(option => ({
                        id: option.id,
                        label: option.label,
                        checked: option.checked
                    })),
                    onChange: () => {}
                });
                container.appendChild(group.container);
                state.plugins.checkboxGroup = group;
            } catch (error) {
                options.forEach(option => {
                    const div = document.createElement('div');
                    div.style.marginBottom = '10px';
                    div.innerHTML = `<input type="checkbox" id="${option.id}" ${option.checked ? 'checked' : ''}><label for="${option.id}" style="margin-left:8px; cursor:pointer;">${option.label}</label>`;
                    container.appendChild(div);
                });
            }
        }

        function getCheckboxValue(id) {
            if (state.plugins.checkboxGroup) {
                try {
                    const states = state.plugins.checkboxGroup.getAllChecked();
                    const index = state.checkboxOptions.findIndex(option => option.id === id);
                    if (index !== -1) return states[index] || false;
                } catch (error) {}
            }
            const native = document.getElementById(id);
            return native ? native.checked : false;
        }

        function updateStatsView() {
            document.getElementById('createdValue').textContent = String(state.stats.created);
            document.getElementById('remainingValue').textContent = String(state.stats.remaining);
            document.getElementById('removedValue').textContent = String(state.stats.removed);
            document.getElementById('lastRemovedValue').textContent = state.stats.lastRemoved ?? '-';
        }

        function renderEmpty(container) {
            container.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'empty';
            div.textContent = '暂无元素，点击“生成元素”开始';
            container.appendChild(div);
        }

        function getAllItems() {
            const container = document.getElementById('demoContainer');
            if (!container) return [];
            return Array.from(container.querySelectorAll('.demo-item'));
        }

        function createItemElement(tag, id, index) {
            const element = document.createElement(tag);
            element.className = 'demo-item';
            element.dataset.id = id;
            element.dataset.index = String(index);
            element.innerHTML = `
                <div class="demo-item-title">${tag.toUpperCase()} 元素</div>
                <div class="demo-item-meta">data-id: ${id}</div>
            `;
            return element;
        }

        function generateElements() {
            const container = document.getElementById('demoContainer');
            if (!container) return;

            const tag = getTypeValue();
            let count = getCountValue();
            if (!Number.isFinite(count)) count = 0;
            count = Math.min(Math.max(0, Math.round(count)), 40);

            container.innerHTML = '';
            if (count === 0) {
                state.stats.created = 0;
                state.stats.remaining = 0;
                state.stats.removed = 0;
                state.stats.lastRemoved = null;
                state.history = [];
                renderEmpty(container);
                updateStatsView();
                return;
            }

            const now = Date.now();
            for (let i = 0; i < count; i++) {
                const id = `${tag}_${now}_${i}`;
                container.appendChild(createItemElement(tag, id, i));
            }

            state.stats.created = count;
            state.stats.remaining = count;
            state.stats.removed = 0;
            state.stats.lastRemoved = null;
            state.history = [];
            updateStatsView();
            showNotification(`已生成 ${count} 个元素`, 'success');
        }

        async function removeTargetElement(element, reason) {
            if (!element) return false;
            const id = element.dataset.id || element.id || element.tagName;
            const ok = await confirmRemove(`确定要移除元素吗？\n${id}`);
            if (!ok) return false;

            removeElement(element);
            state.stats.removed += 1;
            state.stats.remaining = Math.max(0, state.stats.created - state.stats.removed);
            state.stats.lastRemoved = id;
            state.history.unshift({ id, reason, time: new Date().toLocaleTimeString('zh-CN') });
            if (state.history.length > 20) state.history.length = 20;
            updateStatsView();

            const container = document.getElementById('demoContainer');
            if (container && getAllItems().length === 0) renderEmpty(container);

            showNotification(`已移除：${id}`, 'info');
            return true;
        }

        async function removeByStrategy() {
            const items = getAllItems();
            if (!items.length) {
                showNotification('没有可移除的元素', 'warning');
                return;
            }

            const strategy = getStrategyValue();
            if (strategy === 'first') {
                await removeTargetElement(items[0], 'strategy:first');
                return;
            }
            if (strategy === 'last') {
                await removeTargetElement(items[items.length - 1], 'strategy:last');
                return;
            }
            if (strategy === 'random') {
                const idx = Math.floor(Math.random() * items.length);
                await removeTargetElement(items[idx], 'strategy:random');
                return;
            }
            if (strategy === 'index') {
                const idx = getIndexValue();
                if (!Number.isFinite(idx) || idx < 0 || idx >= items.length) {
                    showNotification(`索引无效，范围：0 ~ ${items.length - 1}`, 'warning');
                    return;
                }
                await removeTargetElement(items[idx], 'strategy:index');
            }
        }

        function buildReportHtml() {
            const rows = state.history.slice(0, 10).map(item => `
                <div style="display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid #e5e7eb;">
                    <div style="width:72px; color:#64748b; font-size:12px;">${item.time}</div>
                    <div style="flex:1;">
                        <div style="font-weight:800; color:#0f172a; margin-bottom:4px;">${item.id}</div>
                        <div style="color:#64748b; font-size:12px;">${item.reason}</div>
                    </div>
                </div>
            `).join('');

            return `
                <div style="padding:12px 8px; font-size:14px; color:#1f2937;">
                    <div style="font-weight:900; margin-bottom:10px;">移除报告</div>
                    <div style="margin-bottom:8px;">已生成：<strong>${state.stats.created}</strong>，剩余：<strong>${getAllItems().length}</strong>，已移除：<strong>${state.stats.removed}</strong></div>
                    <div style="margin-bottom:8px;">最近移除：<span style="font-family:JetBrains Mono, monospace;">${state.stats.lastRemoved ?? '无'}</span></div>
                    <div style="margin-top:12px; font-weight:800;">最近 10 条记录</div>
                    <div style="margin-top:8px;">${rows || '<div style="color:#64748b;">暂无记录</div>'}</div>
                </div>
            `;
        }

        function showReport() {
            const content = buildReportHtml();
            if (getCheckboxValue('showModalReport')) {
                showModal(content);
                return;
            }
            showNotification('报告弹窗已关闭，可在控制台查看', 'info');
            console.log(content);
        }

        function resetAll() {
            const container = document.getElementById('demoContainer');
            if (container) renderEmpty(container);
            state.stats.created = 0;
            state.stats.remaining = 0;
            state.stats.removed = 0;
            state.stats.lastRemoved = null;
            state.history = [];
            updateStatsView();
            showNotification('已重置', 'info');
        }

        function bindEvents() {
            const generateBtn = document.getElementById('generateBtn');
            const removeBtn = document.getElementById('removeBtn');
            const reportBtn = document.getElementById('reportBtn');
            const resetBtn = document.getElementById('resetBtn');
            const container = document.getElementById('demoContainer');

            if (generateBtn) generateBtn.addEventListener('click', generateElements);
            if (removeBtn) removeBtn.addEventListener('click', removeByStrategy);
            if (reportBtn) reportBtn.addEventListener('click', showReport);
            if (resetBtn) resetBtn.addEventListener('click', resetAll);

            if (container) {
                container.addEventListener('click', async (e) => {
                    if (!getCheckboxValue('clickToRemove')) return;
                    const item = e.target.closest('.demo-item');
                    if (!item || !container.contains(item)) return;
                    await removeTargetElement(item, 'click');
                });
            }
        }

        function init() {
            initPlugins();
            setupCheckboxes();
            setupSelects();
            setupInputNumbers();
            bindEvents();
            resetAll();
            generateElements();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
